# =============================================================================
# arch-go.yml - Architectural Rules for github.com/hashicorp/consul
# =============================================================================
#
# LAYER HIERARCHY (bottom to top - dependencies must only point downward)
#
#   Layer 1 - Foundation / Shared Primitives (no internal deps)
#     Packages: lib/**, sdk/**, types, ipaddr, logging/**, sentinel,
#               service_os, snapshot, tlsutil, version/**, acl/**,
#               proto/private/**, proto-public/**
#     Role: Primitive utilities, type definitions, generated protobuf stubs,
#           and SDK helpers shared by every other layer.
#
#   Layer 2 - Internal Framework  (must not import Layers 3-5)
#     Packages: internal/controller/**, internal/storage/**,
#               internal/resource/**, internal/multicluster,
#               internal/dnsutil, internal/gossip/**, internal/go-sso/**,
#               internal/protohcl, internal/protoutil, internal/radix,
#               internal/resourcehcl, envoyextensions/**
#     Role: Generic controller runtime, pluggable storage backends, resource
#           registry, and Envoy extension primitives used by the agent layer.
#     NOTE: rules in this file forbid Layer-2 subjects from importing Layers 3-5
#           (agent/**, command/**, api/**, connect/**, troubleshoot/**). Peer
#           imports among internal/** packages and from internal/** into
#           Foundation are intentionally NOT forbidden here; the original
#           prose “depends on Foundation only” is therefore aspirational.
#           Encoding a strict Layer-2 peer DAG would require an agreed
#           internal/** edge list against the real import graph.
#
#   Layer 3 - Agent / Control Plane  (depends on Layers 1-2)
#     Packages: agent/** (except agent/consul/**)
#     Role: Consul client-side agent: config loading, ACL resolution, health
#           checks, cache, DNS, gRPC/RPC client stacks, proxycfg, XDS server,
#           local state sync, token management.
#
#   Layer 4 - Server / Consensus  (depends on Layers 1-3)
#     Packages: agent/consul/**
#     Role: Consul server: Raft FSM, KV state machine, prepared queries,
#           peering RPC, discovery chain, autopilot, usage metrics, WAN
#           federation. Only the server layer may access the state store.
#
#   Layer 5 - API / CLI / Connect  (depends on Layers 1-4)
#     Packages: api/**, command/**, connect/**, troubleshoot/**
#     Role: Public HTTP API client library, CLI commands, Connect SDK.
#           These are leaf packages and must not be imported by inner layers.
#
# EXCLUDED / SPECIAL-SCOPE PACKAGES (outside the five-layer chart; see rules)
#   - grpcmocks/**            : Generated gRPC mock stubs; build artefacts only;
#                             dependenciesRules outbound guards apply.
#   - proto/private/**/prototest : Test helper; not production code.
#   - internal/testing/**     : Test-only helpers; dependenciesRules ban imports
#                               of agent/consul/** (see Harness section).
#   - internal/tools/**       : protoc plug-in binaries; build-time utilities;
#                             dependenciesRules outbound guards apply (see Harness).
#   - internal/resource/protoc-gen-* : Code-generation binaries, not imported.
#   - internal/resource/demo  : Demo/example package; not production.
#   - internal/controller/controllermock : Mock; test helper only.
#   - internal/controller/controllertest : Integration test harness.
#   - internal/storage/conformance : Storage conformance test suite.
#   - internal/protohcl/testproto : Generated test protobuf types.
#   - agent/grpc-external/testutils : gRPC test utilities.
#   - agent/grpc-middleware/testutil : Middleware test utilities.
#   - agent/xds/testcommon    : XDS test helpers.
#   - agent/xds/validateupstream-test : Test-only validate package.
#   - agent/mock              : Agent-level mock objects for tests.
#   - agent/routine-leak-checker : Test leak detection utility.
#   - lib/testhelpers         : Test-only library helpers.
#   - sdk/testutil/**         : SDK test utilities.
#   - test-integ/**           : Integration tests; dependenciesRules ban
#                               agent/consul/** imports (Harness section).
#   - testing/deployer/**   : Deployer scaffolding; same server import ban.
#   - testrpc                 : RPC test helper; same server import ban.
#   - tools/**                : Tooling binaries; same server import ban.
#
# Static import rules cannot prove transitive / indirect violations across
# intermediate packages; a shim package in an “allowed” prefix can still
# re-export types from a forbidden prefix — pair rules on stable intermediates
# or use go mod graph / custom checks for critical edges if required.
#
# Deployment/runtime diagram constraints (control vs data plane, client–server
# control paths, proxy mediation, app isolation) are NOT enforced by this file.
# arch-go matches Go import paths only; runtime topology (sidecar mediation,
# control vs data-plane separation, app traffic isolation, server-only RPC
# paths) cannot be expressed without an explicit package taxonomy mapped to
# those roles. Reviewers MUST treat the diagram constraints as out of scope
# for these YAML rules; CI PASS here does not imply diagram conformance.
#
# Runtime topology in diagrams is mapped via this file’s package rules, not 1:1
# to every diagram arrow.
#
# Intra-agent/consul import acyclicity is only partially encoded (state, fsm,
# discoverychain slices); the rest of the server tree (stream, watch, auth,
# xdscapacity, controller, etc.) is not a full pairwise matrix here. Cycle
# detection across the server tree is delegated to `go build` / import-graph
# analysis in CI; arch-go will not catch new cycles outside the listed slices.
#
# arch-go “coverage” metrics, if shown, are tool heuristics, not a constraint
# coverage matrix. Test-only and excluded package paths in the list above are
# documented in comments; arch-go may still evaluate them where matched by
# a rule’s package glob.
#
# Static import rules cannot detect transitive “shim” laundering: a package
# in an allowed prefix may re-export forbidden types. Pair these rules with
# external lint (depguard, custom analyzers, `go mod graph`) for choke-point
# packages such as lib/safe, agent/structs adapters, and proto re-exports.
#
# Brittle generated-code rules: contentsRules `shouldOnlyContain` on
# proto/**, proto-public/**, and grpcmocks/** is sensitive to protoc/mockgen
# version upgrades that may emit additional helpers classified by arch-go as
# functions. Pin generator versions in go.mod / tools.go and re-run after
# regeneration before merging.
# =============================================================================

# Pin the arch-go schema version explicitly. Without `version: 1`, behaviour
# is implementation-defined when developers or CI install arch-go/arch-go v2
# (different `interfaceImplementationNamingRule` shape) instead of
# fdaines/arch-go v1 (Makefile default). Pair with the Makefile
# `arch-version-check` target which asserts the installed binary is v1.
version: 1

# Threshold defaults are intentionally explicit. `compliance: 100` requires
# every documented rule to PASS. `coverage: 0` accepts arch-go's package-touch
# heuristic as non-architectural (see header narrative); raise this number
# only if the team commits to growing the rule scope to cover that fraction
# of packages.
threshold:
  compliance: 100
  coverage: 0

description: >
  Enforces static import-path layering for github.com/hashicorp/consul along
  five bands: Foundation -> Internal Framework -> Agent / Control Plane ->
  Server / Consensus -> API / CLI / Connect. Lower bands must not import
  higher bands. Layer-2 peer imports (internal/** -> internal/**) are
  intentionally NOT forbidden by this file (one targeted exception:
  internal/multicluster must not import internal/controller/**); the broader
  "Foundation only" prose in the architecture documentation is enforced via
  code review and `go mod graph`, not arch-go. Layer-5 leaves carry asymmetric
  isolation: api/**, connect/**, and troubleshoot/** are strict leaves
  (no agent/**, internal/**, envoyextensions/**); command/** is partially
  permissive (it must reach the agent for entrypoints) but is banned from
  agent/consul/**, internal/**, and envoyextensions/**. Generated protobuf
  stubs, mock packages, test helpers, build-time codegen binaries, and
  diagram-level runtime topology are documented as out of scope. Module-prefix
  layering only, not deployment/runtime topology from architecture diagrams.

# =============================================================================
# DEPENDENCIES RULES
# =============================================================================
dependenciesRules:

  # ---------------------------------------------------------------------------
  # Layer 1 - Foundation: must not import any internal consul package
  # ---------------------------------------------------------------------------
  - description: >
      Foundation packages (lib, sdk, types, ipaddr, logging, acl, proto, tlsutil,
      sentinel, service_os, snapshot, version) are the lowest layer and must not
      import any other internal consul package. They may only depend on the Go
      standard library and approved third-party modules.
    package: "github.com/hashicorp/consul/lib/**"
    shouldNotDependsOn:
      internal:
        - "github.com/hashicorp/consul/agent/**"
        - "github.com/hashicorp/consul/command/**"
        - "github.com/hashicorp/consul/api/**"
        - "github.com/hashicorp/consul/connect/**"
        - "github.com/hashicorp/consul/internal/**"
        - "github.com/hashicorp/consul/envoyextensions/**"
        - "github.com/hashicorp/consul/troubleshoot/**"

  - description: >
      lib root package must match the same Foundation deny list as lib/**
      (glob `/**` may not apply to the directory root import path).
    package: "github.com/hashicorp/consul/lib"
    shouldNotDependsOn:
      internal:
        - "github.com/hashicorp/consul/agent/**"
        - "github.com/hashicorp/consul/command/**"
        - "github.com/hashicorp/consul/api/**"
        - "github.com/hashicorp/consul/connect/**"
        - "github.com/hashicorp/consul/internal/**"
        - "github.com/hashicorp/consul/envoyextensions/**"
        - "github.com/hashicorp/consul/troubleshoot/**"

  - description: >
      sdk packages are Foundation-layer primitives; they must not import agent,
      command, api, connect, internal, or envoyextensions packages.
    package: "github.com/hashicorp/consul/sdk/**"
    shouldNotDependsOn:
      internal:
        - "github.com/hashicorp/consul/agent/**"
        - "github.com/hashicorp/consul/command/**"
        - "github.com/hashicorp/consul/api/**"
        - "github.com/hashicorp/consul/connect/**"
        - "github.com/hashicorp/consul/internal/**"
        - "github.com/hashicorp/consul/envoyextensions/**"
        - "github.com/hashicorp/consul/troubleshoot/**"

  - description: >
      The types package is a primitive; it must not import any higher-layer
      consul packages.
    package: "github.com/hashicorp/consul/types"
    shouldNotDependsOn:
      internal:
        - "github.com/hashicorp/consul/agent/**"
        - "github.com/hashicorp/consul/command/**"
        - "github.com/hashicorp/consul/api/**"
        - "github.com/hashicorp/consul/connect/**"
        - "github.com/hashicorp/consul/internal/**"
        - "github.com/hashicorp/consul/envoyextensions/**"
        - "github.com/hashicorp/consul/troubleshoot/**"

  - description: >
      acl and acl/resolver are Foundation-layer access-control primitives; they
      must not import agent, command, api, or connect packages.
    package: "github.com/hashicorp/consul/acl/**"
    shouldNotDependsOn:
      internal:
        - "github.com/hashicorp/consul/agent/**"
        - "github.com/hashicorp/consul/command/**"
        - "github.com/hashicorp/consul/api/**"
        - "github.com/hashicorp/consul/connect/**"
        - "github.com/hashicorp/consul/internal/**"
        - "github.com/hashicorp/consul/envoyextensions/**"
        - "github.com/hashicorp/consul/troubleshoot/**"

  - description: >
      acl root package must match the same Foundation deny list as acl/**
      (glob `/**` may not apply to the directory root import path).
    package: "github.com/hashicorp/consul/acl"
    shouldNotDependsOn:
      internal:
        - "github.com/hashicorp/consul/agent/**"
        - "github.com/hashicorp/consul/command/**"
        - "github.com/hashicorp/consul/api/**"
        - "github.com/hashicorp/consul/connect/**"
        - "github.com/hashicorp/consul/internal/**"
        - "github.com/hashicorp/consul/envoyextensions/**"
        - "github.com/hashicorp/consul/troubleshoot/**"

  - description: >
      Generated private protobuf packages are Foundation artefacts and must not
      depend on any agent, command, API, connect, or internal packages.
    package: "github.com/hashicorp/consul/proto/**"
    shouldNotDependsOn:
      internal:
        - "github.com/hashicorp/consul/agent/**"
        - "github.com/hashicorp/consul/command/**"
        - "github.com/hashicorp/consul/api/**"
        - "github.com/hashicorp/consul/connect/**"
        - "github.com/hashicorp/consul/internal/**"
        - "github.com/hashicorp/consul/envoyextensions/**"
        - "github.com/hashicorp/consul/troubleshoot/**"

  - description: >
      Generated public protobuf packages (proto-public) are Foundation artefacts
      and must not depend on any agent, command, API, or internal packages.
    package: "github.com/hashicorp/consul/proto-public/**"
    shouldNotDependsOn:
      internal:
        - "github.com/hashicorp/consul/agent/**"
        - "github.com/hashicorp/consul/command/**"
        - "github.com/hashicorp/consul/api/**"
        - "github.com/hashicorp/consul/connect/**"
        - "github.com/hashicorp/consul/internal/**"
        - "github.com/hashicorp/consul/envoyextensions/**"
        - "github.com/hashicorp/consul/troubleshoot/**"

  - description: >
      logging is a Foundation utility and must not import agent, command, api,
      connect, or internal packages.
    package: "github.com/hashicorp/consul/logging/**"
    shouldNotDependsOn:
      internal:
        - "github.com/hashicorp/consul/agent/**"
        - "github.com/hashicorp/consul/command/**"
        - "github.com/hashicorp/consul/api/**"
        - "github.com/hashicorp/consul/connect/**"
        - "github.com/hashicorp/consul/internal/**"
        - "github.com/hashicorp/consul/envoyextensions/**"
        - "github.com/hashicorp/consul/troubleshoot/**"

  - description: >
      logging root package must match the same Foundation deny list as logging/**
      (glob `/**` may not apply to the directory root import path).
    package: "github.com/hashicorp/consul/logging"
    shouldNotDependsOn:
      internal:
        - "github.com/hashicorp/consul/agent/**"
        - "github.com/hashicorp/consul/command/**"
        - "github.com/hashicorp/consul/api/**"
        - "github.com/hashicorp/consul/connect/**"
        - "github.com/hashicorp/consul/internal/**"
        - "github.com/hashicorp/consul/envoyextensions/**"
        - "github.com/hashicorp/consul/troubleshoot/**"

  - description: >
      tlsutil is a Foundation utility and must not import non-foundation consul
      packages.
    package: "github.com/hashicorp/consul/tlsutil"
    shouldNotDependsOn:
      internal:
        - "github.com/hashicorp/consul/agent/**"
        - "github.com/hashicorp/consul/command/**"
        - "github.com/hashicorp/consul/api/**"
        - "github.com/hashicorp/consul/connect/**"
        - "github.com/hashicorp/consul/internal/**"
        - "github.com/hashicorp/consul/envoyextensions/**"
        - "github.com/hashicorp/consul/troubleshoot/**"

  - description: >
      The ipaddr package is Foundation and must not import non-foundation
      consul code.
    package: "github.com/hashicorp/consul/ipaddr"
    shouldNotDependsOn:
      internal:
        - "github.com/hashicorp/consul/agent/**"
        - "github.com/hashicorp/consul/command/**"
        - "github.com/hashicorp/consul/api/**"
        - "github.com/hashicorp/consul/connect/**"
        - "github.com/hashicorp/consul/internal/**"
        - "github.com/hashicorp/consul/envoyextensions/**"
        - "github.com/hashicorp/consul/troubleshoot/**"

  - description: >
      The sentinel package is Foundation and must not import non-foundation
      consul code.
    package: "github.com/hashicorp/consul/sentinel"
    shouldNotDependsOn:
      internal:
        - "github.com/hashicorp/consul/agent/**"
        - "github.com/hashicorp/consul/command/**"
        - "github.com/hashicorp/consul/api/**"
        - "github.com/hashicorp/consul/connect/**"
        - "github.com/hashicorp/consul/internal/**"
        - "github.com/hashicorp/consul/envoyextensions/**"
        - "github.com/hashicorp/consul/troubleshoot/**"

  - description: >
      The service_os package is Foundation and must not import non-foundation
      consul code.
    package: "github.com/hashicorp/consul/service_os"
    shouldNotDependsOn:
      internal:
        - "github.com/hashicorp/consul/agent/**"
        - "github.com/hashicorp/consul/command/**"
        - "github.com/hashicorp/consul/api/**"
        - "github.com/hashicorp/consul/connect/**"
        - "github.com/hashicorp/consul/internal/**"
        - "github.com/hashicorp/consul/envoyextensions/**"
        - "github.com/hashicorp/consul/troubleshoot/**"

  - description: >
      The snapshot package is Foundation and must not import non-foundation
      consul code.
    package: "github.com/hashicorp/consul/snapshot"
    shouldNotDependsOn:
      internal:
        - "github.com/hashicorp/consul/agent/**"
        - "github.com/hashicorp/consul/command/**"
        - "github.com/hashicorp/consul/api/**"
        - "github.com/hashicorp/consul/connect/**"
        - "github.com/hashicorp/consul/internal/**"
        - "github.com/hashicorp/consul/envoyextensions/**"
        - "github.com/hashicorp/consul/troubleshoot/**"

  - description: >
      The version and versiontest packages are Foundation and must not import
      non-foundation consul code.
    package: "github.com/hashicorp/consul/version/**"
    shouldNotDependsOn:
      internal:
        - "github.com/hashicorp/consul/agent/**"
        - "github.com/hashicorp/consul/command/**"
        - "github.com/hashicorp/consul/api/**"
        - "github.com/hashicorp/consul/connect/**"
        - "github.com/hashicorp/consul/internal/**"
        - "github.com/hashicorp/consul/envoyextensions/**"
        - "github.com/hashicorp/consul/troubleshoot/**"

  - description: >
      The top-level version package (import path with no subpath) is
      Foundation and must not import non-foundation consul code.
    package: "github.com/hashicorp/consul/version"
    shouldNotDependsOn:
      internal:
        - "github.com/hashicorp/consul/agent/**"
        - "github.com/hashicorp/consul/command/**"
        - "github.com/hashicorp/consul/api/**"
        - "github.com/hashicorp/consul/connect/**"
        - "github.com/hashicorp/consul/internal/**"
        - "github.com/hashicorp/consul/envoyextensions/**"
        - "github.com/hashicorp/consul/troubleshoot/**"

  # ---------------------------------------------------------------------------
  # Harness / support trees (explicit outbound guards; outside five-layer chart)
  # ---------------------------------------------------------------------------
  - description: >
      Integration test-integ packages must not import server consensus internals.
    package: "github.com/hashicorp/consul/test-integ/**"
    shouldNotDependsOn:
      internal:
        - "github.com/hashicorp/consul/agent/consul/**"

  - description: >
      testing/deployer scaffolding must not import server consensus internals.
    package: "github.com/hashicorp/consul/testing/deployer/**"
    shouldNotDependsOn:
      internal:
        - "github.com/hashicorp/consul/agent/consul/**"

  - description: >
      testrpc helpers must not import server consensus internals.
    package: "github.com/hashicorp/consul/testrpc"
    shouldNotDependsOn:
      internal:
        - "github.com/hashicorp/consul/agent/consul/**"

  - description: >
      tools/** binaries must not import server consensus internals.
    package: "github.com/hashicorp/consul/tools/**"
    shouldNotDependsOn:
      internal:
        - "github.com/hashicorp/consul/agent/consul/**"

  - description: >
      internal/testing helpers must not import server consensus internals.
    package: "github.com/hashicorp/consul/internal/testing/**"
    shouldNotDependsOn:
      internal:
        - "github.com/hashicorp/consul/agent/consul/**"

  - description: >
      internal/tools hosts protoc and codegen binaries; they must not depend on
      the agent, server, CLI, public API, Connect SDK, or troubleshoot packages.
    package: "github.com/hashicorp/consul/internal/tools/**"
    shouldNotDependsOn:
      internal:
        - "github.com/hashicorp/consul/agent/**"
        - "github.com/hashicorp/consul/command/**"
        - "github.com/hashicorp/consul/api/**"
        - "github.com/hashicorp/consul/connect/**"
        - "github.com/hashicorp/consul/troubleshoot/**"
        - "github.com/hashicorp/consul/internal/testing/**"

  - description: >
      grpcmocks packages must not import runtime product layers; mocks are build
      and test artefacts only.
    package: "github.com/hashicorp/consul/grpcmocks/**"
    shouldNotDependsOn:
      internal:
        - "github.com/hashicorp/consul/agent/**"
        - "github.com/hashicorp/consul/command/**"
        - "github.com/hashicorp/consul/api/**"
        - "github.com/hashicorp/consul/connect/**"
        - "github.com/hashicorp/consul/internal/**"
        - "github.com/hashicorp/consul/troubleshoot/**"

  - description: >
      Module-root glue must not depend on integration harness packages as
      libraries (keeps production entrypoints from coupling to test-only trees).
    package: "github.com/hashicorp/consul"
    shouldNotDependsOn:
      internal:
        - "github.com/hashicorp/consul/test-integ/**"
        - "github.com/hashicorp/consul/testing/deployer/**"
        - "github.com/hashicorp/consul/testrpc"

  # ---------------------------------------------------------------------------
  # Layer 2 - Internal Framework: must not import Layer 3-5
  # ---------------------------------------------------------------------------
  - description: >
      The internal/controller framework provides a generic reconciliation runtime.
      It must not import agent, command, api, or connect packages, keeping the
      framework decoupled from the agent's operational concerns.
    package: "github.com/hashicorp/consul/internal/controller/**"
    shouldNotDependsOn:
      internal:
        - "github.com/hashicorp/consul/agent/**"
        - "github.com/hashicorp/consul/command/**"
        - "github.com/hashicorp/consul/api/**"
        - "github.com/hashicorp/consul/connect/**"
        - "github.com/hashicorp/consul/troubleshoot/**"

  - description: >
      internal/controller root package must match the same dependency guard as
      subpackages (glob `/**` may not apply to the directory root import path).
    package: "github.com/hashicorp/consul/internal/controller"
    shouldNotDependsOn:
      internal:
        - "github.com/hashicorp/consul/agent/**"
        - "github.com/hashicorp/consul/command/**"
        - "github.com/hashicorp/consul/api/**"
        - "github.com/hashicorp/consul/connect/**"
        - "github.com/hashicorp/consul/troubleshoot/**"

  - description: >
      internal/storage in-memory backend must not import product layers (agent,
      command, api, connect, troubleshoot). Scoped per-backend so the
      conformance test suite below can carry a relaxed deny list. arch-go v1
      does not support per-rule exclude globs; documentation-only exclusion
      lists do not constrain it.
    package: "github.com/hashicorp/consul/internal/storage/inmem"
    shouldNotDependsOn:
      internal:
        - "github.com/hashicorp/consul/agent/**"
        - "github.com/hashicorp/consul/command/**"
        - "github.com/hashicorp/consul/api/**"
        - "github.com/hashicorp/consul/connect/**"
        - "github.com/hashicorp/consul/troubleshoot/**"

  - description: >
      internal/storage raft backend must not import product layers (same
      Layer-2 framework guards as the inmem backend).
    package: "github.com/hashicorp/consul/internal/storage/raft"
    shouldNotDependsOn:
      internal:
        - "github.com/hashicorp/consul/agent/**"
        - "github.com/hashicorp/consul/command/**"
        - "github.com/hashicorp/consul/api/**"
        - "github.com/hashicorp/consul/connect/**"
        - "github.com/hashicorp/consul/troubleshoot/**"

  - description: >
      internal/storage/conformance is a cross-cutting test contract suite (see
      "EXCLUDED / SPECIAL-SCOPE PACKAGES" in the header). It is intentionally
      out of scope for full Layer-2 product-layer guards because conformance
      suites legitimately need to import test fixtures and helpers across
      packages, but it must not import the CLI (command/**) or diagnostics
      tooling (troubleshoot/**) so the storage contract stays decoupled from
      operator-facing surfaces.
    package: "github.com/hashicorp/consul/internal/storage/conformance"
    shouldNotDependsOn:
      internal:
        - "github.com/hashicorp/consul/command/**"
        - "github.com/hashicorp/consul/troubleshoot/**"

  - description: >
      internal/storage root must match internal/storage backend framework
      outbound guards (glob `/**` may not apply to the directory root import
      path; this duplicate keeps the root-package import path constrained).
    package: "github.com/hashicorp/consul/internal/storage"
    shouldNotDependsOn:
      internal:
        - "github.com/hashicorp/consul/agent/**"
        - "github.com/hashicorp/consul/command/**"
        - "github.com/hashicorp/consul/api/**"
        - "github.com/hashicorp/consul/connect/**"
        - "github.com/hashicorp/consul/troubleshoot/**"

