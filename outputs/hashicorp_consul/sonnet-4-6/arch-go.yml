        - "github.com/hashicorp/consul/command/**"
        - "github.com/hashicorp/consul/api/**"
        - "github.com/hashicorp/consul/connect/**"
        - "github.com/hashicorp/consul/troubleshoot/**"

  - description: >
      agent/consul root must match the same Layer 4 leaf constraints as
      agent/consul/** (glob `/**` may not apply to the directory root import path).
    package: "github.com/hashicorp/consul/agent/consul"
    shouldNotDependsOn:
      internal:
        - "github.com/hashicorp/consul/command/**"
        - "github.com/hashicorp/consul/api/**"
        - "github.com/hashicorp/consul/connect/**"
        - "github.com/hashicorp/consul/troubleshoot/**"

  - description: >
      agent/consul/state is the core state store and must not import any other
      agent/consul sub-package (except agent/consul/stream) to prevent circular
      dependencies inside the server layer.
    package: "github.com/hashicorp/consul/agent/consul/state"
    shouldNotDependsOn:
      internal:
        - "github.com/hashicorp/consul/agent/consul/fsm"
        - "github.com/hashicorp/consul/agent/consul/discoverychain"
        - "github.com/hashicorp/consul/agent/consul/prepared_query"
        - "github.com/hashicorp/consul/agent/consul/gateways"
        - "github.com/hashicorp/consul/agent/consul/usagemetrics"
        - "github.com/hashicorp/consul/agent/consul/wanfed"
        - "github.com/hashicorp/consul/agent/consul/reporting"

  - description: >
      agent/consul/fsm (Raft finite-state machine) must not import these other
      agent/consul sub-packages (keeps the FSM layer acyclic w.r.t. the listed
      server modules; it may import agent/consul/state and related store code as
      required to apply Raft commands). Deny list mirrors agent/consul/state's
      list above (including `reporting`) so the partial intra-server DAG is
      symmetric. Other agent/consul/* peers are not encoded; rely on
      `go build` / import-graph CI to catch new cycles.
    package: "github.com/hashicorp/consul/agent/consul/fsm"
    shouldNotDependsOn:
      internal:
        - "github.com/hashicorp/consul/agent/consul/discoverychain"
        - "github.com/hashicorp/consul/agent/consul/prepared_query"
        - "github.com/hashicorp/consul/agent/consul/gateways"
        - "github.com/hashicorp/consul/agent/consul/usagemetrics"
        - "github.com/hashicorp/consul/agent/consul/wanfed"
        - "github.com/hashicorp/consul/agent/consul/reporting"

  - description: >
      agent/consul/discoverychain computes service routing graphs. It must not
      import the state store directly; it receives data via function arguments
      to keep it testable in isolation.
    package: "github.com/hashicorp/consul/agent/consul/discoverychain"
    shouldNotDependsOn:
      internal:
        - "github.com/hashicorp/consul/agent/consul/state"
        - "github.com/hashicorp/consul/agent/consul/fsm"

  # ---------------------------------------------------------------------------
  # Layer 5 - API / CLI / Connect: leaf packages
  # ---------------------------------------------------------------------------
  - description: >
      The api package is the public HTTP client library for Consul and must not
      import any internal agent, server, or framework packages. External
      consumers import this package; it must have no internal deps beyond
      Foundation libraries.
    package: "github.com/hashicorp/consul/api/**"
    shouldNotDependsOn:
      internal:
        - "github.com/hashicorp/consul/agent/**"
        - "github.com/hashicorp/consul/internal/**"
        - "github.com/hashicorp/consul/envoyextensions/**"
        - "github.com/hashicorp/consul/command/**"
        - "github.com/hashicorp/consul/connect/**"
        - "github.com/hashicorp/consul/troubleshoot/**"

  - description: >
      api root package must match the same leaf dependency constraints as
      subpackages (glob `/**` may not apply to the directory root import path).
    package: "github.com/hashicorp/consul/api"
    shouldNotDependsOn:
      internal:
        - "github.com/hashicorp/consul/agent/**"
        - "github.com/hashicorp/consul/internal/**"
        - "github.com/hashicorp/consul/envoyextensions/**"
        - "github.com/hashicorp/consul/command/**"
        - "github.com/hashicorp/consul/connect/**"
        - "github.com/hashicorp/consul/troubleshoot/**"

  - description: >
      CLI command packages may import api, agent (entrypoints embed the agent),
      and troubleshoot/** libraries (e.g. command/troubleshoot wraps the
      troubleshoot SDK). They must NOT bypass the public boundary into the
      server, internal framework primitives, or envoy extension primitives:
      agent/consul/** is server-internal; internal/** is the Layer-2
      framework; envoyextensions/** is Layer-2 Envoy primitives. CLI features
      that need raw raft / storage / controller / envoy types must be
      refactored to use the public RPC contract (or a single explicit
      exception-scoped subpackage must be carved out and excepted).
    package: "github.com/hashicorp/consul/command/**"
    shouldNotDependsOn:
      internal:
        - "github.com/hashicorp/consul/agent/consul/**"
        - "github.com/hashicorp/consul/internal/**"
        - "github.com/hashicorp/consul/envoyextensions/**"

  - description: >
      command root package must match the same dependency guard as subpackages
      (glob `/**` may not apply to the directory root import path).
    package: "github.com/hashicorp/consul/command"
    shouldNotDependsOn:
      internal:
        - "github.com/hashicorp/consul/agent/consul/**"
        - "github.com/hashicorp/consul/internal/**"
        - "github.com/hashicorp/consul/envoyextensions/**"

  - description: >
      connect and connect/certgen/proxy provide the Connect SDK used by
      applications. As a leaf client-facing SDK (mirroring api/** posture),
      they must not import the agent (any subtree), the server, internal
      framework packages, envoyextensions, command, api, or troubleshoot.
    package: "github.com/hashicorp/consul/connect/**"
    shouldNotDependsOn:
      internal:
        - "github.com/hashicorp/consul/agent/**"
        - "github.com/hashicorp/consul/internal/**"
        - "github.com/hashicorp/consul/envoyextensions/**"
        - "github.com/hashicorp/consul/command/**"
        - "github.com/hashicorp/consul/api/**"
        - "github.com/hashicorp/consul/troubleshoot/**"

  - description: >
      connect root package must match the same leaf SDK constraints as
      subpackages (glob `/**` may not apply to the directory root import path).
    package: "github.com/hashicorp/consul/connect"
    shouldNotDependsOn:
      internal:
        - "github.com/hashicorp/consul/agent/**"
        - "github.com/hashicorp/consul/internal/**"
        - "github.com/hashicorp/consul/envoyextensions/**"
        - "github.com/hashicorp/consul/command/**"
        - "github.com/hashicorp/consul/api/**"
        - "github.com/hashicorp/consul/troubleshoot/**"

  - description: >
      troubleshoot utilities inspect live proxy and port state. As a Layer-5
      leaf SDK consumed by humans and other tools, it must remain isolated
      from the agent (any subtree), the server, internal framework packages,
      envoyextensions, command, and api. This brings troubleshoot/** to the
      same strict-leaf posture as connect/** and api/**.
    package: "github.com/hashicorp/consul/troubleshoot/**"
    shouldNotDependsOn:
      internal:
        - "github.com/hashicorp/consul/agent/**"
        - "github.com/hashicorp/consul/internal/**"
        - "github.com/hashicorp/consul/envoyextensions/**"
        - "github.com/hashicorp/consul/command/**"
        - "github.com/hashicorp/consul/api/**"

# =============================================================================
# CONTENTS RULES
#
# arch-go (both fdaines/arch-go v1.5.4 and arch-go/arch-go v2) requires FLAT
# boolean keys at the rule level: `shouldNotContainInterfaces: true` /
# `shouldOnlyContainStructs: true`. Earlier revisions of this file used a
# nested-list shape (`shouldNotContainAnyOf:` / `shouldOnlyContain:`) which
# arch-go silently dropped — the rules then PASSed vacuously. The flat keys
# below produce real, non-empty checks.
#
# Review #5 also removed the agent/consul/state `shouldNotContainInterfaces`
# rule. That ban contradicted the agent/consul/state Store naming rule
# (`structsThatImplement: "Store"` requires a Store interface to exist in the
# package). Eliminating one was the only way to stop the two rules from
# silently negating each other; the naming convention is the more useful
# guarantee, so the ban was dropped. Re-introduce only with a precise
# predicate (e.g. forbid only *exported* interfaces) once arch-go supports it.
# =============================================================================
contentsRules:

  - description: >
      Generated private protobuf packages should contain only struct
      definitions (and their generated method sets). Hand-written interfaces
      or free functions in proto/** are policy violations. BRITTLENESS:
      protoc / protoc-gen-go upgrades may emit helpers that arch-go
      reclassifies as functions, flipping CI to FAIL with no architectural
      change. Pin generator versions in tools.go / go.mod and regenerate
      locally before bumping.
    package: "github.com/hashicorp/consul/proto/**"
    shouldOnlyContainStructs: true

  - description: >
      Public generated protobuf packages mirror the proto/** policy: structs
      and their generated method sets only. Same BRITTLENESS caveat as
      proto/** applies on protoc / plugin upgrades.
    package: "github.com/hashicorp/consul/proto-public/**"
    shouldOnlyContainStructs: true

  - description: >
      grpcmocks packages contain mock structs and their generated methods only
      (mockgen output). Hand-written interfaces or free functions are not
      permitted. This is structural hygiene only (not part of the five-layer
      dependency model; see header exclusion list). BRITTLENESS: mockgen /
      mockery upgrades may emit constructor helpers or package-level vars
      that arch-go classifies as functions; pin the mock generator and
      regenerate before bumping.
    package: "github.com/hashicorp/consul/grpcmocks/**"
    shouldOnlyContainStructs: true

# =============================================================================
# NAMING RULES
# =============================================================================
namingRules:

  - description: >
      All types in agent/consul/state that represent a read/write handle to a
      named data collection must be suffixed with 'Store' to distinguish them
      from plain data structs and to maintain naming consistency across the
      state layer.
    package: "github.com/hashicorp/consul/agent/consul/state"
    interfaceImplementationNamingRule:
      structsThatImplement: "Store"
      shouldHaveSimpleNameEndingWith: "Store"

  - description: >
      Types inside internal/storage that implement the storage backend interface
      must be suffixed with 'Backend' to clearly communicate their role as a
      pluggable persistence layer (e.g., InmemBackend, RaftBackend).
    package: "github.com/hashicorp/consul/internal/storage/**"
    interfaceImplementationNamingRule:
      structsThatImplement: "Backend"
      shouldHaveSimpleNameEndingWith: "Backend"

  - description: >
      Resolver types inside agent/grpc-internal/resolver that satisfy the
      standard Resolver contract must be suffixed with 'Resolver' for
      discoverability.
    package: "github.com/hashicorp/consul/agent/grpc-internal/resolver"
    interfaceImplementationNamingRule:
      structsThatImplement: "Resolver"
      shouldHaveSimpleNameEndingWith: "Resolver"

  - description: >
      CA provider implementations inside agent/connect/ca must be suffixed
      with 'Provider' to match the CAProvider interface naming convention used
      throughout the Connect CA subsystem.
    package: "github.com/hashicorp/consul/agent/connect/ca"
    interfaceImplementationNamingRule:
      structsThatImplement: "Provider"
      shouldHaveSimpleNameEndingWith: "Provider"

  - description: >
      Controller reconciler implementations inside internal/controller packages
      must be suffixed with 'Reconciler' to align with the framework's
      Reconciler interface and make implementors easy to identify.
    package: "github.com/hashicorp/consul/internal/controller/**"
    interfaceImplementationNamingRule:
      structsThatImplement: "Reconciler"
      shouldHaveSimpleNameEndingWith: "Reconciler"

  - description: >
      Server-side controller reconciler implementations in agent/consul/controller
      must follow the same naming convention as the framework reconcilers in
      internal/controller/**. The internal/controller/** rule above does not
      reach this server-layer sibling (different package prefix); a parallel
      rule keeps server-side reconciler names consistent with the framework
      contract.
    package: "github.com/hashicorp/consul/agent/consul/controller"
    interfaceImplementationNamingRule:
      structsThatImplement: "Reconciler"
      shouldHaveSimpleNameEndingWith: "Reconciler"

  - description: >
      Rate limiter implementations in agent/consul/rate must be suffixed with
      'Limiter' to follow the established pattern for rate-limiting types in
      the server layer.
    package: "github.com/hashicorp/consul/agent/consul/rate"
    interfaceImplementationNamingRule:
      structsThatImplement: "RequestLimiter"
      shouldHaveSimpleNameEndingWith: "Limiter"

  - description: >
      Rate limiter implementations in agent/consul/multilimiter must be
      suffixed with 'Limiter'. The RequestLimiter interface lives in
      agent/consul/rate (not in this package), so the per-package
      interfaceImplementationNamingRule "structsThatImplement: RequestLimiter"
      does not resolve in this scope. Use the wildcard "*Limiter" instead so
      the rule keys on a name pattern (any interface ending in Limiter)
      defined in or imported by this package, instead of a same-package
      interface lookup that would otherwise degrade to a no-op.
    package: "github.com/hashicorp/consul/agent/consul/multilimiter"
    interfaceImplementationNamingRule:
      structsThatImplement: "*Limiter"
      shouldHaveSimpleNameEndingWith: "Limiter"

# =============================================================================
# FUNCTIONS RULES
# =============================================================================
functionsRules:

  - description: >
      Functions in agent/consul/state (the core state store) must return at most
      two values. State store accessors returning more than two values indicate
      overly complex signatures that should be decomposed into separate methods
      or structs, improving readability and testability.
    package: "github.com/hashicorp/consul/agent/consul/state"
    maxReturnValues: 2

  - description: >
      Functions in agent/consul/discoverychain must return at most two values.
      Discovery chain computation functions that return multiple results should
      encapsulate them in a result struct, keeping function signatures clean.
    package: "github.com/hashicorp/consul/agent/consul/discoverychain"
    maxReturnValues: 2

  - description: >
      lib utility functions should prefer small signatures; up to three return
      values are allowed for idiomatic (T, U, error) or similar helpers.
    package: "github.com/hashicorp/consul/lib/**"
    maxReturnValues: 3

  - description: >
      lib root package return-signature guard (pair with lib/**). The `/**`
      glob may not match the directory root import path per the generator
      contract; this duplicate keeps maxReturnValues enforced on `lib`.
    package: "github.com/hashicorp/consul/lib"
    maxReturnValues: 3

  - description: >
      internal/storage backend functions should prefer small signatures; up to
      three return values are allowed where (value, auxiliary, error) is clearer
      than a result struct.
    package: "github.com/hashicorp/consul/internal/storage/**"
    maxReturnValues: 3

  - description: >
      internal/storage root package return-signature guard (pair with
      internal/storage/**). The `/**` glob may not match the directory root
      import path per the generator contract; this duplicate keeps
      maxReturnValues enforced on `internal/storage`.
    package: "github.com/hashicorp/consul/internal/storage"
    maxReturnValues: 3
