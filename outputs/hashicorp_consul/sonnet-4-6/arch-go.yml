  # FORWARD-COMPAT NOTE (Review #5 / [F11]): for many single-directory leaves
  # (agent/ae, auto-config, blockingquery, cacheshim, checks, configentry,
  # debug, dns, envoyextensions, exec, leafcert, local, log-drop, metadata,
