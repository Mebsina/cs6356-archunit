  # ---------------------------------------------------------------------------
  # Layer 3 - Agent / Control Plane: directory-root mirrors
  #
  # Per the generator contract documented in prompts/1-generate-go.md, the
  # `/**` glob matches sub-packages and may NOT match the root directory
  # import path. Every Layer-3 agent subtree above is a single-directory
  # package in inputs/go/1_hashicorp_consul.txt; without these mirrors the
  # `/**` rule above could match zero packages and silently allow forbidden
  # imports of agent/consul/**, command/**, api/**, connect/**, or
  # troubleshoot/** from the root directory of each subtree.
