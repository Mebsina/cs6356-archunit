    package: "github.com/hashicorp/consul/command"
    shouldNotDependsOn:
      internal:
        - "github.com/hashicorp/consul/internal"
        - "github.com/hashicorp/consul/internal/**"

  # -------------------------------------------------------------------------
  # Harness defense-in-depth (production must not depend on test harnesses)
  # -------------------------------------------------------------------------
  # Test harnesses, integration suites, and codegen tools are exactly the
  # packages that production code must NEVER take a runtime dependency on.
  # arch-go has no implicit "blacklist by absence" mechanism, so each
  # production layer enumerates the harness trees explicitly below.
  #
  # Two coverage classes are addressed below (see F3, F4, F5, F6 in Review #3):
  #
  #   1. Each production layer that has a populated ROOT package as well as
  #      a `**` subtree gets BOTH a `<layer>` rule and a `<layer>/**` rule.
  #      arch-go's `**` glob requires at least one extra path segment, so
  #      `agent/agent.go`, `api/api.go`, `connect/connect.go`, `lib/lib.go`,
  #      and `acl/acl.go` would otherwise bypass every harness rule.
  #
  #   2. The `agent/**` deny-list is augmented with the in-tree harness
  #      packages that LIVE under agent/** (agent/grpc-external/testutils,
  #      agent/grpc-middleware/testutil, agent/xds/testcommon,
  #      agent/xds/validateupstream-test, agent/mock). These targets are
  #      duplicated on the api/**, internal/**, command/**, and grpcmocks/**
  #      deny-lists so that no production layer may pull the in-tree harness
  #      into a release binary.
  #
  #   3. `command/**` (and `command` root) are added — Round 2 forgot the
  #      CLI, which is precisely the layer most likely to drift into a
  #      "release-engineering helper that imports tools/internal-grpc-proxy"
  #      pattern.
  #
  #   4. `grpcmocks/**` is added so that mock packages cannot transitively
  #      pull harness trees into every test binary that imports them.

  # ----- Agent (Layer 4) -----
  - description: >
      Agent subtree must not depend on integration / build / test harness
      trees, including the in-tree harness packages that live under agent/**.
      The harness depends on production, never the reverse.
