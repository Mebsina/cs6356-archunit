        - "github.com/hashicorp/consul/api/**"
        - "github.com/hashicorp/consul/command"
        - "github.com/hashicorp/consul/command/**"

  # ----- Intra-agent client/server split: non-server agent ↛ agent/consul/** -----
  # The architecture diagram (1_hashicorp_consul.jpg) splits agent/** into:
  #   - Server side: agent/consul/** (Raft FSM, state store, server RPC).
  #   - Client side: every other agent/<leaf>/.
  # Non-server agent code must NOT import agent/consul/**.
  #
  # The previous 40+ per-leaf rules have been consolidated to a single
  # `agent/**` glob plus the `agent` root mirror. arch-go does not flag a
  # package's dependency on its own subtree, so `agent/consul/**` as an
  # origin is matched here but trivially complies (it cannot import itself).
  # This means new agent leaves added in the future are covered without
  # needing to remember to add a rule each — see F11 in Adversarial Review #3.
  - description: >
      Non-server agent code (every agent/<leaf>) must not depend on the
      agent/consul/** server subtree (Raft FSM, state store, server RPC).
      agent/consul/** as an origin is matched by this glob but trivially
      complies because a package never imports itself.
    package: "github.com/hashicorp/consul/agent/**"
    shouldNotDependsOn:
      internal:
        - "github.com/hashicorp/consul/agent/consul"
        - "github.com/hashicorp/consul/agent/consul/**"

  - description: >
      Same as above, for the agent root package (`agent/agent.go` etc.).
    package: "github.com/hashicorp/consul/agent"
    shouldNotDependsOn:
      internal:
        - "github.com/hashicorp/consul/agent/consul"
        - "github.com/hashicorp/consul/agent/consul/**"

  # -------------------------------------------------------------------------
  # Layer 5 — API
  # -------------------------------------------------------------------------
  - description: >
      The API package is the public client library and must not depend
      on any internal, agent, or command logic.
    package: "github.com/hashicorp/consul/api/**"
    shouldNotDependsOn:
      internal:
        - "github.com/hashicorp/consul/internal"
        - "github.com/hashicorp/consul/internal/**"
        - "github.com/hashicorp/consul/agent"
        - "github.com/hashicorp/consul/agent/**"
        - "github.com/hashicorp/consul/command"
        - "github.com/hashicorp/consul/command/**"

  - description: API root package mirror.
