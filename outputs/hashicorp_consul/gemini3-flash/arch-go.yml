  - description: proto-public/** must not depend on harness trees.
    package: "github.com/hashicorp/consul/proto-public/**"
    shouldNotDependsOn:
      internal:
        - "github.com/hashicorp/consul/testing/deployer"
        - "github.com/hashicorp/consul/testing/deployer/**"
        - "github.com/hashicorp/consul/test-integ"
        - "github.com/hashicorp/consul/test-integ/**"
        - "github.com/hashicorp/consul/testrpc"
        - "github.com/hashicorp/consul/tools"
        - "github.com/hashicorp/consul/tools/**"
        - "github.com/hashicorp/consul/internal/testing/**"
        - "github.com/hashicorp/consul/internal/tools/**"

  # ----- Foundation: acl (root + subtree) -----
  - description: acl/** must not depend on harness trees.
    package: "github.com/hashicorp/consul/acl/**"
    shouldNotDependsOn:
      internal:
        - "github.com/hashicorp/consul/testing/deployer"
        - "github.com/hashicorp/consul/testing/deployer/**"
        - "github.com/hashicorp/consul/test-integ"
        - "github.com/hashicorp/consul/test-integ/**"
        - "github.com/hashicorp/consul/testrpc"
        - "github.com/hashicorp/consul/tools"
        - "github.com/hashicorp/consul/tools/**"
        - "github.com/hashicorp/consul/internal/testing/**"
        - "github.com/hashicorp/consul/internal/tools/**"

  - description: acl root package (mirror of acl/**) must not depend on harness trees.
    package: "github.com/hashicorp/consul/acl"
    shouldNotDependsOn:
      internal:
        - "github.com/hashicorp/consul/testing/deployer"
        - "github.com/hashicorp/consul/testing/deployer/**"
        - "github.com/hashicorp/consul/test-integ"
        - "github.com/hashicorp/consul/test-integ/**"
        - "github.com/hashicorp/consul/testrpc"
        - "github.com/hashicorp/consul/tools"
        - "github.com/hashicorp/consul/tools/**"
        - "github.com/hashicorp/consul/internal/testing/**"
        - "github.com/hashicorp/consul/internal/tools/**"

  # ----- grpcmocks (sibling tree) — NEWLY ADDED in Review #3 (F6) -----
  - description: >
      grpcmocks/** must not depend on harness trees. A mock package taking
      a runtime dep on a harness pulls the harness into every test binary
      that imports the mock; the original grpcmocks layer rule banned
      production layers but forgot the harness trees.
    package: "github.com/hashicorp/consul/grpcmocks/**"
    shouldNotDependsOn:
      internal:
        - "github.com/hashicorp/consul/testing/deployer"
        - "github.com/hashicorp/consul/testing/deployer/**"
        - "github.com/hashicorp/consul/test-integ"
        - "github.com/hashicorp/consul/test-integ/**"
        - "github.com/hashicorp/consul/testrpc"
        - "github.com/hashicorp/consul/tools"
        - "github.com/hashicorp/consul/tools/**"
        - "github.com/hashicorp/consul/internal/testing/**"
        - "github.com/hashicorp/consul/internal/tools/**"

  # NOTE: agent/<leaf>/testutils, agent/grpc-middleware/testutil,
  # agent/xds/testcommon, agent/xds/validateupstream-test, and agent/mock
  # are themselves harness packages that LIVE inside agent/**. They are
  # matched by the `agent/**` rule above as ORIGINS — that is fine; they
  # are agent code and the layered rules apply to them. Crucially, they
  # are now also listed as DENY TARGETS on every layer's harness rule
  # above so production code in any layer cannot import them. If a future
  # refactor moves them under a `//go:build testharness` tag, arch-go can
  # be invoked with `-tags=testharness` to scope scans accordingly.

# =============================================================================
# CONTENTS RULES
# =============================================================================
# arch-go's contents rules are flat boolean keys directly on the rule object
# (shouldOnlyContainStructs / shouldNotContainInterfaces / etc.). The previous
# nested-list shape (shouldOnlyContain: [- interfaces: true, ...]) was silently
# ignored — see F1 in Adversarial Review #1.
#
# `shouldNotContainFunctions: true` was deliberately REMOVED from proto/**,
# proto-public/**, and grpcmocks/**. arch-go evaluates that key as "this
# package has zero top-level function declarations," which is false for
# every generated `*.pb.go` file (each declares `init()`, `file_xxx_proto_init()`,
# and gRPC `RegisterXxxServer` registration helpers as free functions) and
# every mockery-generated package (constructors and EXPECT helpers are free
# functions). Leaving the rule in place would have produced a CI bombshell
# the moment the YAML parsed correctly. The "generated, not hand-written"
# intent is better enforced by a presubmit hook that asserts every `.go`
# under proto*/** carries the standard `// Code generated by ...` header.
# See F2 / F10 in Adversarial Review #3.
contentsRules:
  - description: >
      Generated proto packages should not declare hand-written interfaces.
      (Generated free functions like init() and gRPC registration helpers
      are out of scope for arch-go and are enforced separately by the
      generator's `Code generated by ...` header.)
    package: "github.com/hashicorp/consul/proto/**"
    shouldNotContainInterfaces: true

  - description: >
      Generated public proto packages should not declare hand-written
      interfaces. (Same caveat as proto/** — generated free functions are
      out of scope here.)
    package: "github.com/hashicorp/consul/proto-public/**"
    shouldNotContainInterfaces: true

  - description: >
      Mock packages should not declare hand-written interfaces. They may
      contain helper free functions (constructors, EXPECT helpers) emitted
      by mockery — those are out of scope for arch-go.
    package: "github.com/hashicorp/consul/grpcmocks/**"
    shouldNotContainInterfaces: true

# =============================================================================
# NAMING RULES
# =============================================================================
# Naming rules retarget Consul's actual storage and resource interfaces.
# The original Store / Repository names did not match the upstream codebase
# (Backend / Reconciler are the real abstractions) — see F16 in Review #1.
#
# `structsThatImplement` is encoded as a flat string. Round 2 attempted to
# migrate to the v2 map form `{ internal: "*Backend" }`, but the installed
# arch-go binary (v1.5.4 fork still selected by the Makefile's `command -v`
# short-circuit) rejects the map and aborts the entire YAML unmarshal,
# causing every rule in this file to silently stop loading. The flat-string
# form is accepted by both v1 and v2 and is the conservative interoperable
# encoding (see F1 in Adversarial Review #3).
namingRules:
  - description: >
      [Redundant safety net] All structs in internal/storage (root) that
      implement the Backend interface should be named *Backend. The Backend
      interface is currently DEFINED in this root package but its
      implementers live in internal/storage/raft and internal/storage/inmem,
      so this rule passes vacuously today. It is retained as a forward-
      compatibility net for any future implementer added directly under the
      storage root (see F7 in Adversarial Review #3).
    package: "github.com/hashicorp/consul/internal/storage"
    interfaceImplementationNamingRule:
      structsThatImplement: "*Backend"
      shouldHaveSimpleNameEndingWith: "Backend"

  - description: >
      All structs in internal/storage/** that implement the Backend interface
      should be named *Backend (matching the actual Consul storage abstraction).
    package: "github.com/hashicorp/consul/internal/storage/**"
    interfaceImplementationNamingRule:
      structsThatImplement: "*Backend"
      shouldHaveSimpleNameEndingWith: "Backend"

  - description: >
      All structs in internal/controller/** that implement the Reconciler
      interface should be named *Reconciler.
    package: "github.com/hashicorp/consul/internal/controller/**"
    interfaceImplementationNamingRule:
      structsThatImplement: "*Reconciler"
      shouldHaveSimpleNameEndingWith: "Reconciler"

# =============================================================================
# FUNCTIONS RULES
# =============================================================================
# arch-go does NOT support cyclomatic complexity. The previous `maxComplexity`
# field was silently dropped (see F2). The closest available proxies are
# `maxLines` and `maxParameters`. For real cyclomatic-complexity enforcement,
# pair this file with a `gocyclo -over 15 ./internal/...` pre-commit / CI hook.
functionsRules:
  - description: >
      Internal-layer functions should be small and focused. (arch-go does not
      support cyclomatic complexity; pair with gocyclo for the actual bound.)
    package: "github.com/hashicorp/consul/internal/**"
    maxLines: 80
    maxParameters: 6

  - description: >
      Foundation utility functions in the lib package must return at most
      two values (usually a result and an error) to maintain simplicity.
    package: "github.com/hashicorp/consul/lib/**"
    maxReturnValues: 2
