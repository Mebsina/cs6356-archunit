        - "github.com/hashicorp/consul/internal/**"
        - "github.com/hashicorp/consul/agent"
        - "github.com/hashicorp/consul/agent/**"
        - "github.com/hashicorp/consul/command"
        - "github.com/hashicorp/consul/command/**"

  # -------------------------------------------------------------------------
  # Mock packages (grpcmocks/**) — sibling-tree dependency direction
  # -------------------------------------------------------------------------
  # Mock packages must be tightly scoped to depend ONLY on the proto-public
  # packages they mock (plus standard library / external mocking framework).
  # A mock that takes a transitive dep on agent/** or internal/** pulls a
  # huge graph into every test that imports the mock, defeating the purpose
  # of putting the mocks in a sibling tree.
  - description: gRPC mock packages must not depend on higher Consul layers.
    package: "github.com/hashicorp/consul/grpcmocks/**"
    shouldNotDependsOn:
