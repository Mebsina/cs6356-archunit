# =============================================================================
# HashiCorp Consul Architecture Enforcement Configuration
# =============================================================================
#
# This configuration enforces the architectural integrity of the Consul
# codebase using arch-go. It ensures proper layering, dependency flow,
# and structural conventions across the Go module.
#
# LAYER HIERARCHY (Bottom to Top):
# -------------------------------
# 1. Foundation (Base Utilities): Primitive libraries, SDKs, and root-level
#    bedrock packages. Anything in this layer must not import the agent, api,
#    command, internal, connect, envoyextensions, or troubleshoot layers.
#    Foundation packages ARE permitted to depend on Layer-2 generated proto
#    packages (proto/**, proto-public/**) for serialization helpers — those
#    are pure data carriers, not "higher" logic. (See F11 in Adversarial
#    Review #2 for the rationale: rules and preamble are now aligned on
#    this softer-than-strict-layering interpretation.)
#    - github.com/hashicorp/consul/lib/**
#    - github.com/hashicorp/consul/sdk/**
#    - github.com/hashicorp/consul/types
#    - github.com/hashicorp/consul/version, version/**
#    - github.com/hashicorp/consul/ipaddr
#    - github.com/hashicorp/consul/sentinel
#    - github.com/hashicorp/consul/service_os
#    - github.com/hashicorp/consul/snapshot
#    - github.com/hashicorp/consul/tlsutil
#    - github.com/hashicorp/consul/logging, logging/**
#    - github.com/hashicorp/consul/acl, acl/**
#
# 2. Data Plane / Protos: Generated protobuf structures and data definitions.
#    - github.com/hashicorp/consul/proto/**
#    - github.com/hashicorp/consul/proto-public/**
#
# 3. Domain Core (Internal): Business logic and storage implementations.
#    - github.com/hashicorp/consul/internal/**
#    Cross-cutting peers at this layer also include:
#    - github.com/hashicorp/consul/connect, connect/**
#    - github.com/hashicorp/consul/envoyextensions/**
#    - github.com/hashicorp/consul/troubleshoot/**
#
# 4. Control Plane (Agent): The core Consul agent daemon logic.
#    - github.com/hashicorp/consul/agent/**
#    Note: agent/** is split internally between:
#      - Server-side: agent/consul/** (Raft FSM, state store, server RPC).
#      - Client-side: every other agent/<leaf>/ (DNS, xDS, proxycfg, etc.).
#    Non-server agent code must NOT import agent/consul/**.
#
# 5. Interface (API): Public client library for external consumers.
#    - github.com/hashicorp/consul/api/**
#
# 6. Consumer (Command): CLI implementations and command-line entry points.
#    - github.com/hashicorp/consul/command/**
#
# SCOPE NOTE — Documentation-only entries:
# ---------------------------------------
# arch-go has no native package-exclusion mechanism. The following subtrees
# live UNDER broader globs (proto/**, agent/**, lib/**, sdk/**) and ARE in
# scope of those rules — they are NOT excluded. The only subtree truly
# outside any `package:` glob in this file is `test-integ/**`, kept that way
# intentionally as it is integration scaffolding. (See F10 in Adversarial
# Review #2 — the previous "EXCLUDED" label was incorrect for the four
# entries below.)
# - github.com/hashicorp/consul/proto/private/**     : covered by proto/** rules.
# - github.com/hashicorp/consul/test-integ/**        : truly out-of-scope (no glob).
# - github.com/hashicorp/consul/sdk/testutil/**      : covered by sdk/** rules.
# - github.com/hashicorp/consul/lib/testhelpers      : covered by lib/** rules.
# - github.com/hashicorp/consul/agent/mock           : covered by agent/** rules.
#
# SCOPE NOTE — Test Files:
# ------------------------
# arch-go scans all `.go` files including `_test.go`. Test helpers that
# intentionally cross layer boundaries should live under a dedicated build
# tag (e.g. `//go:build testhelpers`) or in a directory listed in the
# "SCOPE NOTE — Documentation-only entries" block above. Harness trees
# (test-integ/**, testing/deployer/**, testrpc, tools/**, internal/testing/**,
# internal/tools/**) are protected from being depended-on by production code
# via explicit deny-lists below — see the "Harness defense-in-depth" block.
#
# NOTE on cyclomatic complexity:
# -----------------------------
# arch-go does NOT support a `maxComplexity` field. Cyclomatic-complexity
# enforcement is delegated to a `gocyclo` / `gocognit` pre-commit hook. The
# `functionsRules` below use `maxLines` + `maxParameters` as a coarse proxy.
# =============================================================================

version: 1
description: Architectural rules for HashiCorp Consul enforcing a layered structure.

# =============================================================================
# THRESHOLD
# =============================================================================
# arch-go's "coverage" metric is package-touch (how many packages in this
# module were evaluated by at least one rule). The compliance gate is the
# one that gates the build.
#
# `coverage: 0` DISABLED — re-enable as a regression sentinel once a
# baseline is measured. Recommended workflow: run `arch-go --json` once,
# read the actual coverage percentage out of the report, and set the
# threshold to (measured value − 2pts) so a future rule deletion or glob
# narrowing trips CI without making green-CI dependent on perfect
# package-touch.
threshold:
  compliance: 100
  coverage: 0

# =============================================================================
# DEPENDENCIES RULES
# =============================================================================
dependenciesRules:
  # -------------------------------------------------------------------------
  # Layer 1 — Foundation
  # -------------------------------------------------------------------------
  # Foundation members (lib, sdk, types, version, ipaddr, sentinel, service_os,
  # snapshot, tlsutil, logging, acl) are all sibling peers at this layer; they
  # may freely import each other (e.g. acl → lib is fine) and may also import
  # proto/** and proto-public/** for serialization helpers. They must NOT
  # depend on any layer above them.
  #
  # When adding a new Foundation member, mirror the 12-target deny-list below
  # (and add both a root rule and, if applicable, a `**` subtree rule):
  #
  #   - description: <name> must not depend on higher layers.
  #     package: "github.com/hashicorp/consul/<name>"
  #     shouldNotDependsOn:
  #       internal:
  #         - "github.com/hashicorp/consul/agent"
  #         - "github.com/hashicorp/consul/agent/**"
  #         - "github.com/hashicorp/consul/api"
  #         - "github.com/hashicorp/consul/api/**"
  #         - "github.com/hashicorp/consul/internal"
  #         - "github.com/hashicorp/consul/internal/**"
  #         - "github.com/hashicorp/consul/command"
  #         - "github.com/hashicorp/consul/command/**"
  #         - "github.com/hashicorp/consul/connect"
  #         - "github.com/hashicorp/consul/connect/**"
  #         - "github.com/hashicorp/consul/envoyextensions/**"
  #         - "github.com/hashicorp/consul/troubleshoot/**"
  #
  # (proto/** and proto-public/** are intentionally absent — Foundation members
  # may use them for serialization helpers; see lines 14–18.)
  # See F12 in Adversarial Review #3 for the rationale behind this template.
  - description: >
      Foundation lib subtree must not depend on higher-level layers
      (agent, api, internal, command, connect, envoyextensions, troubleshoot).
    package: "github.com/hashicorp/consul/lib/**"
    shouldNotDependsOn:
      internal:
        - "github.com/hashicorp/consul/agent"
        - "github.com/hashicorp/consul/agent/**"
        - "github.com/hashicorp/consul/api"
        - "github.com/hashicorp/consul/api/**"
        - "github.com/hashicorp/consul/internal"
        - "github.com/hashicorp/consul/internal/**"
        - "github.com/hashicorp/consul/command"
        - "github.com/hashicorp/consul/command/**"
        - "github.com/hashicorp/consul/connect"
        - "github.com/hashicorp/consul/connect/**"
        - "github.com/hashicorp/consul/envoyextensions/**"
        - "github.com/hashicorp/consul/troubleshoot/**"

  - description: Foundation lib root package (mirror of lib/**).
    package: "github.com/hashicorp/consul/lib"
    shouldNotDependsOn:
      internal:
        - "github.com/hashicorp/consul/agent"
        - "github.com/hashicorp/consul/agent/**"
        - "github.com/hashicorp/consul/api"
        - "github.com/hashicorp/consul/api/**"
        - "github.com/hashicorp/consul/internal"
        - "github.com/hashicorp/consul/internal/**"
        - "github.com/hashicorp/consul/command"
        - "github.com/hashicorp/consul/command/**"
        - "github.com/hashicorp/consul/connect"
        - "github.com/hashicorp/consul/connect/**"
        - "github.com/hashicorp/consul/envoyextensions/**"
        - "github.com/hashicorp/consul/troubleshoot/**"

  - description: >
      SDK packages are shared primitives and must remain independent of
      operational logic in agent, api, internal, command, connect,
      envoyextensions, or troubleshoot.
    package: "github.com/hashicorp/consul/sdk/**"
    shouldNotDependsOn:
      internal:
