# =============================================================================
# arch-go.yml - Kubernetes Architectural Constraint Rules
# =============================================================================
#
# ARCHITECTURE LAYER HIERARCHY (bottom to top, dependencies point downward)
#
#   Layer 6 - CLI / Entry Points (cmd/**)
#     Binary entry points: kube-apiserver, kubelet, kube-proxy, kube-scheduler,
#     kube-controller-manager, cloud-controller-manager, kubectl,
#     kubectl-convert, kubeadm. May depend on any internal layer. Nothing
#     depends on cmd. Each binary tree must NOT import sibling-binary internals
#     (separate-binary deployability invariant).
#
#   Layer 5 - Control Plane (pkg/controlplane/**)
#     Assembles API server and reconcilers. Depends on API, kubeapiserver,
#     controller, and scheduler layers. Must not depend on node-side code
#     (kubelet, proxy).
#
#   Layer 4 - Component Packages
#     - API Server Support  (pkg/kubeapiserver/**)
#     - Controller Manager  (pkg/controller/**)
#     - Scheduler           (pkg/scheduler/**)
#     - Kubelet             (pkg/kubelet/**)
#     - Kube-Proxy          (pkg/proxy/**)
#     These are parallel component layers. They form a fully symmetric
#     non-coupling lattice: no Layer-4 sibling may import any other Layer-4
#     sibling, and none may import Layer-5 controlplane.
#
#   Layer 3 - Domain / Registry (pkg/registry/**)
#     Storage-backed resource handlers. Depends on APIs and util. Must not
#     depend on component layers (controller, kubelet, proxy, scheduler,
#     kubeapiserver) or control plane.
#
#   Layer 2 - API Types (pkg/apis/** and pkg/api/**)
#     Internal Kubernetes API object type definitions and conversion/validation
#     logic. Foundational; must not import higher layers. The two Layer-2
#     trees are peers and must not depend on each other (parallel-peer rule).
#
#   Layer 1 - Shared Utilities (pkg/util/**)
#     Low-level, reusable helpers (iptables, hash, env, etc.). Must not import
#     any other pkg/** layer above it (including api, apis, registry,
#     leaf-component subsystems such as volume, credentialprovider, kubectl,
#     printers, security, securitycontext).
#
# =============================================================================
# SCOPE OF ANALYSIS
#
#   arch-go scans every Go package in the module declared by `go.mod` (which
#   must be `k8s.io/kubernetes` for these globs to match). The Makefile
#   `arch-check` target asserts the module identity via `go list -m` and
#   refuses to run against the wrong module; it also fails when the report's
#   COVERAGE RATE drops below a configured floor (see review #2 [F1]) and
#   propagates arch-go's exit code via bash `pipefail` (see review #3 [F1]).
#
#   There is no per-package exclusion mechanism in this YAML and arch-go
#   v1.5.x does not support brace expansion in `package:` globs.
#
#   Review #5 [F2] / [F4] (option B applied): the per-sub-package fan-outs
#   for pkg/controller, pkg/scheduler, pkg/registry, and pkg/volume were
#   reverted in favour of broad globs (`pkg/<X>/**`) plus their bare-path
#   sibling (`pkg/<X>`). The fan-outs had two systemic defects:
#
#     1. Each `pkg/<X>/<Y>/**` rule silently exempted the bare canonical
#        sub-package `pkg/<X>/<Y>` (where the canonical *Controller /
#        Plugin / Storage / Volume struct lives) because arch-go's `**`
#        glob does not match the bare prefix (review #5 [F2]).
#     2. Many of the predictive sub-tree entries targeted packages that
#        do not exist in the supplied snapshot (e.g., pkg/registry/core,
#        pkg/scheduler/apis), making them vacuous.
#
#   The reverted broad globs accept four expected false-positive sources
#   (cross-layer test helpers): pkg/scheduler/testing, pkg/controller/testutil,
#   pkg/registry/registrytest, pkg/volume/testing. Track these per review
#   #5 [F2] option (B) — either move them to internal/<helper> upstream or
#   carve narrow per-helper exceptions once the empirical run reveals the
#   actual cross-layer imports.
#
#   The pkg/api fan-out (review #4 [F5]) was originally retained but
#   review #7 [F3] / [F5] collapsed it back to a single broad `pkg/api/**`
#   rule. The 20-rule fan-out had two issues:
#
#     1. It deliberately omitted pkg/api/testing from any subject glob,
#        leaving pkg/api/testing as the ONLY first-party Layer-2 helper
#        with zero subject coverage — its Layer-2 → upper-layer imports
#        were completely unconstrained (review #7 [F3]).
#     2. The 20 nearly-identical rules were a maintenance burden
#        disproportionate to the benefit; adding the review #7 [F2]
#        leaf-component sweep would have required 21 × 17 copy-paste
#        edits (review #7 [F5]).
#
#   The collapsed broad rule treats pkg/api/testing as a documented
#   expected-false-positive source under the broad glob, consistent with
#   how the other four cross-layer test helpers are handled.
#
#   IMPORTANT — bare-package coverage on BOTH SUBJECT and OBJECT sides:
#   arch-go's `**` glob requires at least one path segment after the prefix,
#   so `pkg/scheduler/**` does NOT match the bare `pkg/scheduler` package
#   (where the canonical `Scheduler` struct and main `Run` loop live).
#
#   Review #6 [F2] / [F3] / [F4] / [F5]: the bare-path insight is now
#   applied symmetrically to BOTH the `package:` (subject) field AND the
#   `internal:` (object) field of every dependency rule. Every deny-list
#   entry of the form `<X>/**` is paired with a sibling entry `<X>`
#   wherever `<X>` is a real Go package in the module, so an import of
#   bare `pkg/scheduler` / `pkg/kubelet` / `pkg/proxy` / `pkg/controller`
#   / `pkg/registry` / `pkg/controlplane` / `pkg/kubeapiserver` /
#   `pkg/volume` is no longer invisible to the deny lists.
#
#   The convention applies to:
#     - subject side: every `<X>/**` rule has a sibling `<X>` rule
#       (review #3 [F2], [F11]; review #4 [F2] for kubelet/proxy/
#       kubeapiserver/controlplane; review #5 [F3] for all 10 cmd
#       binaries; review #5 [F5] for pkg/kubelet/container and
#       pkg/proxy/util intra-layer fences).
#     - object side: every `<X>/**` deny entry has a sibling `<X>`
#       deny entry where `<X>` is a real Go package (review #6 [F2]).
#
#   The same insight applies to naming rules over kubelet manager
#   sub-packages: the canonical interface declaration (e.g.,
#   `type VolumeManager interface`, `type ContainerManager interface`,
#   the per-cm-sub-manager `type Manager interface`) and its primary
#   implementing struct live in the BARE sub-package, not in any auxiliary
#   sub-sub-package. Review #4 [F3] therefore scopes each kubelet manager
#   naming rule to the bare sub-package (omitting the `/**` suffix) so the
#   canonical implementer is matched.
#
#   First-party paths covered by NO `package:` glob below (i.e., violations
#   in these paths are invisible to arch-go):
#
#     # vendored / generated / non-source paths (intentional)
#     - vendor/**, third_party/**         (vendored / forked dependencies)
#     - test/**                            (integration / e2e suites)
#     - pkg/generated/**                   (generated openapi)
#     - hack/**, build/**, cluster/**      (tooling and packaging)
#
#     # build/release tooling cmd binaries (intentionally permissive — these
#     # are docs/lint/codegen helpers, not deployable Kubernetes binaries):
#     - cmd/clicheck, cmd/dependencycheck, cmd/dependencyverifier,
#       cmd/fieldnamedocscheck, cmd/gendocs, cmd/genfeaturegates,
#       cmd/genkubedocs, cmd/genman, cmd/genswaggertypedocs, cmd/genutils,
#       cmd/genyaml, cmd/gotemplate, cmd/import-boss, cmd/importverifier,
#       cmd/preferredimports, cmd/prune-junit-xml
#
#     # leaf utility packages — review #7 [F4] added dedicated leaf-
#     # isolation rules for the previously unconstrained set so they no
#     # longer rely on the broad pkg/** -> cmd/** catch-all (which only
#     # forbids cmd-imports, not component / control-plane back-imports):
#     #   pkg/auth/** (covers pkg/auth/nodeidentifier),
#     #   pkg/capabilities, pkg/certauthorization,
#     #   pkg/client/** (covers pkg/client/conditions, pkg/client/tests),
#     #   pkg/cluster/ports, pkg/features, pkg/fieldpath, pkg/routes,
#     #   pkg/windows/service
#     # Review #8 [F2] propagates the OBJECT-side counterpart of these nine
#     # leaves into the pkg/util/**, pkg/apis/**, and pkg/api/** deny lists
#     # (plus plugin/** for util) so util / apis / api may not back-import
#     # them, mirroring the leaf-component subsystem treatment.
#
#   Review #8 [F3]: the plugin/** rule's deny list was extended to include
#   pkg/kubeapiserver and pkg/kubeapiserver/**. The plugin/** rule's own
#   description states that plugins are "loaded by kubeapiserver/admission"
#   — so plugin → kubeapiserver is the inverse of the documented loader
#   direction and would create an import cycle. Every other leaf rule
#   (security, securitycontext, serviceaccount, probe, kubectl, printers,
#   kubemark, credentialprovider, volume) already denied kubeapiserver;
#   plugin/** was the lone outlier despite having the strongest documented
#   coupling.
#
#   Review #8 [F4]: the pkg/proxy/util / pkg/proxy/util/** intra-layer
#   fences were extended to deny kubemark, metaproxier, and runner in
#   addition to the four production backends. These three are unambiguous
#   backend / orchestrator / fake packages that the implementation-
#   agnostic util layer must not import. The borderline conntrack /
#   healthcheck / metrics packages are deferred until the empirical run
#   reveals legitimate util-side use.
#
#   Review #8 [F5]: the pkg/kubelet/container / pkg/kubelet/container/**
#   intra-layer fence's three listed directions (server, config,
#   volumemanager) remain as documented architectural intent; the
#   descriptions now credit Go's import-cycle prohibition as the actual
#   enforcement mechanism for the other ~25 above-container kubelet sub-
#   packages that consume container.Runtime directly.
#
# =============================================================================

description: >
  Enforces the Kubernetes component architecture. The
  https://kubernetes.io/docs/concepts/overview/components/ documentation
  specifies the cluster topology (control-plane vs. node) and the
  separate-binary deployability of kube-apiserver, kube-scheduler,
  kube-controller-manager, cloud-controller-manager, kubelet, kube-proxy,
  kubectl, and kubeadm. This YAML encodes that separate-binary invariant
  as a Layer-4 non-coupling lattice across controller / scheduler / kubelet /
  proxy / kubeapiserver — a design decision in the spirit of the documented
  topology rather than a direct documentation citation. The lattice is
  enforced via broad `pkg/<X>/**` rules paired with bare-path siblings on
  `pkg/<X>` (review #3 [F2] / [F11], review #4 [F2], review #5 [F2]),
  so canonical bare-path declarations such as
  pkg/scheduler/scheduler.go, pkg/kubelet/kubelet.go, pkg/proxy/types.go,
  pkg/controller/deployment/deployment_controller.go,
  pkg/scheduler/framework/types.go, and pkg/volume/csi/csi_plugin.go are
  ALL inside the lattice's match set — not silently exempted by the prior
  per-sub-package fan-out approach. Review #6 [F2] / [F3] / [F4] / [F5]:
  the same bare + `/**` pair convention is now applied symmetrically to
  the OBJECT side (the `internal:` deny lists) of every dependency rule,
  closing the gap where imports of bare `pkg/scheduler` / `pkg/kubelet` /
  `pkg/proxy` / `pkg/controller` / `pkg/registry` / `pkg/controlplane` /
  `pkg/kubeapiserver` / `pkg/volume` (and their canonical sub-package
  bare paths under intra-layer fences) were silently exempt from the
  Layer-4 / Layer-3 / Layer-5 / leaf-isolation / cmd-side bans.
  Layer-3 (registry) is blocked from every Layer-4 sibling and Layer-5
  (controlplane). Cmd-side rules block cross-binary coupling and now use
  the same bare + `/**` pair convention for all 10 cmd binaries
  (review #5 [F3]) so the bare main.go entry points (cmd/kubelet/main.go,
  cmd/kubectl, cmd/cloud-controller-manager, cmd/kubectl-convert, etc.)
  cannot silently back-import sibling-binary internals: kubectl and
  kubectl-convert are client-only; kubeadm uses generated manifests and
  clientset only; kube-apiserver/cloud-controller-manager/
  kube-controller-manager/kube-scheduler/kube-proxy/kubelet binaries may
  not import each other's pkg/<sibling> bare or pkg/<sibling>/**
  subtrees and may not back-import controlplane or kubeapiserver assembly
  (review #3 [F3] makes the cmd/kube-apiserver fence symmetric with its
  peers; review #6 [F2] adds bare-path companions to every cmd-side deny
  list). cmd/kubemark is the only first-party deployable binary that
  legitimately imports parts of pkg/kubelet/** and pkg/proxy/kubemark to
  fake a kubelet/kube-proxy — its rule denies the production kube-proxy
  backends (iptables, ipvs, nftables, winkernel) per-backend rather than
  using the broad pkg/proxy/** ban that would mis-fire on pkg/proxy/kubemark
  (review #3 [F4], review #4 [F7]); review #6 [F5] adds bare-path
  companions for each backend so a direct import of bare pkg/proxy/iptables
  (where the canonical iptables Proxier struct lives) is also denied.
  Cross-layer test helpers (pkg/scheduler/testing, pkg/controller/testutil,
  pkg/registry/registrytest, pkg/volume/testing, pkg/api/testing) are
  documented expected-false-positive sources under the broad globs — track
  them per review #5 [F2] option (B) and either move to internal/<helper>
  upstream or carve per-helper exceptions once the empirical run reveals
  their actual cross-layer imports. Review #7 [F3] / [F5]: the 20-rule
  pkg/api per-sub-package fan-out (review #4 [F5]) was collapsed into a
  single broad `pkg/api/**` rule. The fan-out had deliberately omitted
  pkg/api/testing from every subject glob — the only first-party Layer-2
  helper whose Layer-2 → upper-layer imports were completely
  unconstrained — and the 20 nearly-identical rules were a maintenance
  burden disproportionate to the benefit. The collapsed broad rule brings
  pkg/api/testing into scope as an expected-false-positive source.
  Review #7 [F2]: leaf-component subsystems (volume, credentialprovider,
  kubectl, kubemark, printers, probe, security, securitycontext,
  serviceaccount, plugin) added to the deny lists of the pkg/apis/** and
  the new broad pkg/api/** rule, mirroring the util-layer rule's complete
  leaf-isolation shape — Layer-2 sits below the leaf-component subsystems
  in the import DAG and must not back-import them any more than util must.
  Review #7 [F4]: nine cross-cutting leaf packages (pkg/auth/**,
  pkg/capabilities, pkg/certauthorization, pkg/client/**,
  pkg/cluster/ports, pkg/features, pkg/fieldpath, pkg/routes,
  pkg/windows/service) that were previously documented as "covered only
  by the broad pkg/** -> cmd/** catch-all" each now have a dedicated
  leaf-isolation rule, because the catch-all forbids only cmd-imports
  and not component / control-plane back-imports.
  Review #8 [F2]: the OBJECT-side counterpart of review #7 [F4] is now
  propagated to the pkg/util/**, pkg/apis/**, and pkg/api/** deny lists —
  the nine cross-cutting leaves are added so util / apis / api may not
  back-import them (mirroring the leaf-component subsystem treatment).
  plugin/** is also added to the pkg/util/** deny list (was missing from
  util-layer but already present in apis / api).
  Review #8 [F3]: the plugin/** deny list now denies pkg/kubeapiserver
  and pkg/kubeapiserver/** to match the round's documented loaded-by
  relationship (kubeapiserver/admission imports plugins, so plugins must
  not back-import kubeapiserver) and to mirror the every-other-leaf
  pattern.
  Review #8 [F4]: pkg/proxy/util / pkg/proxy/util/** intra-layer fence
  now denies kubemark, metaproxier, and runner in addition to the four
  production backends (iptables, ipvs, nftables, winkernel); the
  borderline conntrack / healthcheck / metrics packages are deferred
  until the empirical run reveals legitimate util-side use.
  Review #8 [F5]: the pkg/kubelet/container / pkg/kubelet/container/**
  intra-layer fence's three listed directions (server, config,
  volumemanager) remain as documented architectural intent; the
  description now credits Go's import-cycle prohibition as the actual
  enforcement mechanism for the other ~25 above-container kubelet sub-
  packages that consume container.Runtime directly.
  The intra-layer fences for pkg/kubelet/container
  and pkg/proxy/util now also use the bare + `/**` pair on both sides
  (review #5 [F5] subject side, review #6 [F4] object side) so a direct
  import of bare pkg/kubelet/server (canonical HTTP server) or bare
  pkg/proxy/iptables (canonical iptables Proxier) is also denied. The
  vacuous pkg/kubectl/** rule was removed (review #6 [F6]) because the
  package list contains only the bare pkg/kubectl compatibility shim;
  re-add a /** rule when in-tree kubectl sub-packages are reintroduced
  upstream. Naming rules apply interface-scoped suffix conventions to
  Controller/Manager/Proxier implementations; the registry `Storage`
  naming rule was removed in review #4 [F4] because the upstream
  convention uses suffix `REST` for individual handlers and `Storage`
  only for the multiplexer aggregator, which arch-go's single-suffix
  matcher cannot express. arch-go's simple-name interface resolution may
  produce false positives where the same simple interface name is reused
  across sub-packages — kubelet manager rules are therefore narrowed to
  a single bare sub-package each, matching where the canonical interface
  and its primary implementer live (review #2 [F7], extended in review #3
  [F8] for the cm sub-managers, switched to bare-path scope in review #4
  [F3]).

# =============================================================================
# DEPENDENCY RULES
# =============================================================================
dependenciesRules:

  # ---------------------------------------------------------------------------
  # Layer 1 - Shared Utilities must not import higher pkg layers
  # ---------------------------------------------------------------------------
  - description: >
      Shared utility packages (pkg/util/**) are the lowest internal layer.
      They must not import any higher pkg/** layer, including api/apis types,
      registry, component layers (controller, kubelet, proxy, scheduler,
      kubeapiserver), controlplane assembly, or the leaf-component subsystems
      (volume, credentialprovider, kubectl, kubemark, printers, probe,
      security, securitycontext, serviceaccount) that themselves sit above
      util in the import DAG. Review #5 [F6]: pkg/probe added for
      consistency with the other leaf-component subsystems. Review #6 [F3]:
      bare-path companions added for pkg/kubelet, pkg/proxy,
      pkg/kubeapiserver, pkg/controlplane (the four subsystems whose
      bare-path SUBJECT rules were added in review #4 [F2] but whose
      OBJECT-side bare paths were missing here). Review #8 [F2]: nine
      cross-cutting leaf packages (pkg/auth/**, pkg/capabilities,
      pkg/certauthorization, pkg/client/**, pkg/cluster/ports, pkg/features,
      pkg/fieldpath, pkg/routes, pkg/windows/service) added to mirror the
      OBJECT-side counterpart of the round-7 [F4] SUBJECT rules — these
      leaves sit ABOVE pkg/util in the import DAG so util must not back-
      import them. plugin/** also added (was missing from this util-layer
      deny list, present in pkg/apis/** and pkg/api/**).
    package: "k8s.io/kubernetes/pkg/util/**"
    shouldNotDependsOn:
      internal:
        - "k8s.io/kubernetes/pkg/api/**"
        - "k8s.io/kubernetes/pkg/apis/**"
        - "k8s.io/kubernetes/pkg/registry"
        - "k8s.io/kubernetes/pkg/registry/**"
        - "k8s.io/kubernetes/pkg/controller"
        - "k8s.io/kubernetes/pkg/controller/**"
        - "k8s.io/kubernetes/pkg/kubelet"
        - "k8s.io/kubernetes/pkg/kubelet/**"
        - "k8s.io/kubernetes/pkg/proxy"
        - "k8s.io/kubernetes/pkg/proxy/**"
        - "k8s.io/kubernetes/pkg/scheduler"
        - "k8s.io/kubernetes/pkg/scheduler/**"
        - "k8s.io/kubernetes/pkg/kubeapiserver"
        - "k8s.io/kubernetes/pkg/kubeapiserver/**"
        - "k8s.io/kubernetes/pkg/controlplane"
        - "k8s.io/kubernetes/pkg/controlplane/**"
        - "k8s.io/kubernetes/pkg/volume"
        - "k8s.io/kubernetes/pkg/volume/**"
        - "k8s.io/kubernetes/pkg/credentialprovider"
        - "k8s.io/kubernetes/pkg/credentialprovider/**"
        - "k8s.io/kubernetes/pkg/kubectl"
        - "k8s.io/kubernetes/pkg/kubectl/**"
        - "k8s.io/kubernetes/pkg/kubemark"
        - "k8s.io/kubernetes/pkg/kubemark/**"
        - "k8s.io/kubernetes/pkg/printers"
        - "k8s.io/kubernetes/pkg/printers/**"
        - "k8s.io/kubernetes/pkg/probe"
        - "k8s.io/kubernetes/pkg/probe/**"
        - "k8s.io/kubernetes/pkg/security"
        - "k8s.io/kubernetes/pkg/security/**"
        - "k8s.io/kubernetes/pkg/securitycontext"
        - "k8s.io/kubernetes/pkg/securitycontext/**"
        - "k8s.io/kubernetes/pkg/serviceaccount"
        - "k8s.io/kubernetes/pkg/serviceaccount/**"
        - "k8s.io/kubernetes/pkg/auth/**"
        - "k8s.io/kubernetes/pkg/capabilities"
        - "k8s.io/kubernetes/pkg/certauthorization"
        - "k8s.io/kubernetes/pkg/client/**"
        - "k8s.io/kubernetes/pkg/cluster/ports"
        - "k8s.io/kubernetes/pkg/features"
        - "k8s.io/kubernetes/pkg/fieldpath"
        - "k8s.io/kubernetes/pkg/routes"
        - "k8s.io/kubernetes/pkg/windows/service"
        - "k8s.io/kubernetes/plugin/**"

  # ---------------------------------------------------------------------------
  # Layer 2 - pkg/apis/** must not import its Layer-2 peer pkg/api/** or higher
  # ---------------------------------------------------------------------------
  - description: >
      Internal API type packages (pkg/apis/**) define the canonical Kubernetes
      object model. They must remain foundational and must not import their
      Layer-2 peer (pkg/api/**), the registry layer, component packages, or
      higher-level control-plane packages. Review #6 [F2]: bare-path
      companions added for the OBJECT-side deny entries. Review #7 [F2]:
      leaf-component subsystems (volume, credentialprovider, kubectl,
      kubemark, printers, probe, security, securitycontext, serviceaccount,
      plugin) added to the deny list to mirror the util-layer rule's
      complete leaf-isolation shape — Layer-2 sits below the leaf-component
      subsystems in the import DAG and must not back-import them any more
      than util must. Review #8 [F2]: nine cross-cutting leaf packages
      (pkg/auth/**, pkg/capabilities, pkg/certauthorization, pkg/client/**,
      pkg/cluster/ports, pkg/features, pkg/fieldpath, pkg/routes,
      pkg/windows/service) added to mirror the OBJECT-side counterpart of
      the round-7 [F4] SUBJECT rules — these leaves sit ABOVE Layer-2 in
      the import DAG so apis must not back-import them.
    package: "k8s.io/kubernetes/pkg/apis/**"
    shouldNotDependsOn:
      internal:
        - "k8s.io/kubernetes/pkg/api/**"
        - "k8s.io/kubernetes/pkg/registry"
        - "k8s.io/kubernetes/pkg/registry/**"
        - "k8s.io/kubernetes/pkg/controller"
        - "k8s.io/kubernetes/pkg/controller/**"
        - "k8s.io/kubernetes/pkg/kubelet"
        - "k8s.io/kubernetes/pkg/kubelet/**"
        - "k8s.io/kubernetes/pkg/proxy"
        - "k8s.io/kubernetes/pkg/proxy/**"
        - "k8s.io/kubernetes/pkg/scheduler"
        - "k8s.io/kubernetes/pkg/scheduler/**"
        - "k8s.io/kubernetes/pkg/kubeapiserver"
        - "k8s.io/kubernetes/pkg/kubeapiserver/**"
        - "k8s.io/kubernetes/pkg/controlplane"
        - "k8s.io/kubernetes/pkg/controlplane/**"
        - "k8s.io/kubernetes/pkg/volume"
        - "k8s.io/kubernetes/pkg/volume/**"
        - "k8s.io/kubernetes/pkg/credentialprovider"
        - "k8s.io/kubernetes/pkg/credentialprovider/**"
        - "k8s.io/kubernetes/pkg/kubectl"
        - "k8s.io/kubernetes/pkg/kubemark"
        - "k8s.io/kubernetes/pkg/kubemark/**"
        - "k8s.io/kubernetes/pkg/printers"
        - "k8s.io/kubernetes/pkg/printers/**"
        - "k8s.io/kubernetes/pkg/probe"
        - "k8s.io/kubernetes/pkg/probe/**"
        - "k8s.io/kubernetes/pkg/security"
        - "k8s.io/kubernetes/pkg/security/**"
        - "k8s.io/kubernetes/pkg/securitycontext"
        - "k8s.io/kubernetes/pkg/securitycontext/**"
        - "k8s.io/kubernetes/pkg/serviceaccount"
        - "k8s.io/kubernetes/pkg/serviceaccount/**"
        - "k8s.io/kubernetes/pkg/auth/**"
        - "k8s.io/kubernetes/pkg/capabilities"
        - "k8s.io/kubernetes/pkg/certauthorization"
        - "k8s.io/kubernetes/pkg/client/**"
        - "k8s.io/kubernetes/pkg/cluster/ports"
        - "k8s.io/kubernetes/pkg/features"
        - "k8s.io/kubernetes/pkg/fieldpath"
        - "k8s.io/kubernetes/pkg/routes"
        - "k8s.io/kubernetes/pkg/windows/service"
        - "k8s.io/kubernetes/plugin/**"

  # ---------------------------------------------------------------------------
  # Layer 2 - pkg/api/** must not import its Layer-2 peer pkg/apis/** or higher
  #
  # Review #4 [F5]: the broad `pkg/api/**` rule was originally replaced with
  # per-sub-package enumeration so that the cross-layer test helper
  # `pkg/api/testing` (which legitimately reaches into clientset / informer
  # factories / controller and registry sub-packages to build fake reconciler
  # harnesses) was excluded by positive sub-tree enumeration.
  #
  # Review #7 [F3] / [F5]: the 20-rule pkg/api fan-out was collapsed back to
  # a single broad `pkg/api/**` rule. The fan-out had two issues:
  #   1. It deliberately omitted pkg/api/testing from any subject glob, so
  #      pkg/api/testing was the ONLY first-party Layer-2 helper whose
  #      Layer-2 → upper-layer imports were completely unconstrained.
  #   2. The 20 nearly-identical rules with identical deny content were a
  #      maintenance burden disproportionate to the benefit; adding the
  #      review #7 [F2] leaf-component sweep would have required 21 × 17
  #      copy-paste edits.
  # The collapsed broad rule treats pkg/api/testing as a documented
  # expected-false-positive source under the broad glob (review #5 [F2]
  # option B treatment), consistent with how pkg/scheduler/testing,
  # pkg/controller/testutil, pkg/registry/registrytest, and pkg/volume/testing
  # are handled. Track pkg/api/testing's actual cross-layer imports per
  # review #5 [F2] option (B) — either move to internal/testing upstream
  # or carve a narrow per-helper exception once the empirical run reveals
  # the actual offenders.
  #
  # Review #7 [F2]: leaf-component subsystems (volume, credentialprovider,
  # kubectl, kubemark, printers, probe, security, securitycontext,
  # serviceaccount, plugin) added to the deny list to mirror the util-layer
  # rule's complete leaf-isolation shape — Layer-2 sits below the leaf-
  # component subsystems in the import DAG and must not back-import them
  # any more than util must.
  # ---------------------------------------------------------------------------
  - description: >
      pkg/api/** is Layer-2 (foundational API helpers — pod template helpers
      for batch.Job, legacyscheme registration, node taint helpers,
      persistentvolume helpers, etc.). Must not import the Layer-2 peer
      (pkg/apis/**), the registry layer, component layers (controller,
      kubelet, proxy, scheduler, kubeapiserver), Layer-5 controlplane
      assembly, or leaf-component subsystems (volume, credentialprovider,
      kubectl, kubemark, printers, probe, security, securitycontext,
      serviceaccount, plugin). pkg/api/testing is an expected false-positive
      source under this broad glob (it legitimately builds fake reconciler
      harnesses from clientset / informer / controller helpers); track its
      cross-layer imports per review #5 [F2] option (B) and either move it
      to internal/testing upstream or carve a narrow per-helper exception
      once the empirical run reveals the actual offenders. No bare-path
      companion is needed because no bare pkg/api package exists in the
      module (only sub-packages); the broad `**` glob covers every
      pkg/api/<sub> sub-package as a one-segment extension. Review #8 [F2]:
      nine cross-cutting leaf packages (pkg/auth/**, pkg/capabilities,
      pkg/certauthorization, pkg/client/**, pkg/cluster/ports, pkg/features,
      pkg/fieldpath, pkg/routes, pkg/windows/service) added to mirror the
      OBJECT-side counterpart of the round-7 [F4] SUBJECT rules — these
      leaves sit ABOVE Layer-2 in the import DAG so api must not back-
      import them.
