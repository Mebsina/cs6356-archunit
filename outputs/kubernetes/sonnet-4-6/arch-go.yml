  # Layer 3 - Registry must not import component layers, controlplane, or
  # kubeapiserver. Layer 3 → Layer 4 inversion is forbidden (registry sits
  # below kubeapiserver/controlplane in the assembly graph).
  #
  # Review #5 [F2] / [F4] (option B applied): the per-sub-package fan-out
  # introduced in review #2 [F3] (rbac, resource) and extended in review #3
  # [F7] / review #4 (predictive sub-trees: core, apps, batch, networking,
  # storage, policy, certificates, admissionregistration) was reverted in
  # favour of a single broad `pkg/registry/**` rule plus the bare-path
  # sibling. Rationale:
  #
  #   1. The per-sub-package fan-out exempted the bare canonical sub-package
  #      paths from the Layer-3 → Layer-4 ban (e.g., bare pkg/registry/rbac
  #      where escalation_check.go lives), since arch-go's `**` glob does
  #      not match the bare prefix (review #5 [F2]).
  #   2. Eight of the eleven fan-out entries (core/apps/batch/networking/
  #      storage/policy/certificates/admissionregistration) targeted
  #      packages that are not present in the supplied snapshot — i.e.,
  #      they were predictive against upstream master rather than derived
  #      from the actual targeted commit (review #5 [F4]).
