  # false positive; document any cross-layer imports it produces and either
  # move it to `pkg/registry/internal/registrytest` upstream or carve a
  # narrow exception once the empirical run reveals the actual offenders.
  #
  # Review #6 [F2]: bare-path companions added to the OBJECT-side deny
  # entries (controller, kubelet, proxy, scheduler, kubeapiserver,
  # controlplane) so imports of those bare canonical sibling packages
  # are caught.
