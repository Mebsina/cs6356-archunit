      documentation form; the other ~25 above-container sub-packages
      (kuberuntime, status, eviction, lifecycle, pleg, prober, pluginmanager,
      oom, pod, allocation, cm, ...) are protected at compile time by Go's
      import-cycle prohibition because they all import container.Runtime
