  # ---------------------------------------------------------------------------
  # Intra-layer: kubelet/container (and sub-packages) must not import server.
  # The pkg/kubelet/types leaf rule from prior rounds was deleted: Go's
  # import-cycle prohibition already prevents kubelet/types from importing
  # any kubelet sub-package that imports kubelet/types itself, making the
  # rule structurally redundant (review #2 [F10]).
  #
  # Note (review #3 [F12]): some of the directions below (container →
  # server, container → volumemanager) are likely already prevented by Go's
  # import-cycle handling because server/volumemanager depend on
  # container.Runtime. The rule remains as documentation of the intended
  # architectural fence; verify on a real upstream run which directions
  # actually fire vs. duplicate compiler-enforced cycles.
  #
  # Review #6 [F4]: bare-path companions added to the OBJECT-side deny
  # entries (pkg/kubelet/server, pkg/kubelet/config, pkg/kubelet/volumemanager)
  # so a direct import of the bare canonical sub-package — where the
  # canonical HTTP server, config loader, and VolumeManager implementations
  # live — is also denied.
  # ---------------------------------------------------------------------------
  - description: >
      Bare pkg/kubelet/container package (where the canonical Runtime
      interface lives in pkg/kubelet/container/runtime.go). Same intra-
      layer fence as the /** rule below; the `**` glob does not match the
      bare path (review #5 [F5]). Review #8 [F5]: the listed three
      directions (server, config, volumemanager) are documented
      architectural intent; the other ~25 above-container kubelet sub-
      packages (kuberuntime, status, eviction, lifecycle, pleg, prober,
      pluginmanager, oom, pod, allocation, cm, ...) consume container.Runtime
      and are protected at compile time by Go's import-cycle prohibition.
      When adding a new kubelet sub-package, add it to this deny list if
      it does not directly import container.Runtime.
    package: "k8s.io/kubernetes/pkg/kubelet/container"
    shouldNotDependsOn:
      internal:
        - "k8s.io/kubernetes/pkg/kubelet/server"
        - "k8s.io/kubernetes/pkg/kubelet/server/**"
        - "k8s.io/kubernetes/pkg/kubelet/config"
        - "k8s.io/kubernetes/pkg/kubelet/config/**"
        - "k8s.io/kubernetes/pkg/kubelet/volumemanager"
        - "k8s.io/kubernetes/pkg/kubelet/volumemanager/**"

