# =============================================================================
# NAMING RULES
# =============================================================================
#
# arch-go v1's only supported naming construct is `interfaceImplementationNamingRule`,
# which constrains struct types that implement a named interface within the
# matched package(s). arch-go matches `structsThatImplement` by **simple
# interface name** (no package qualifier). Where the simple name is reused
# across multiple sub-packages, the rule is therefore narrowed to a single
# sub-package so it scopes to exactly one declared interface (review #2 [F7]).
#
namingRules:

  # ---------------------------------------------------------------------------
  # Controller implementations must be suffixed with 'Controller'.
  #
  # NOTE: arch-go matches `structsThatImplement` by simple interface name
  # only. The `Interface` simple name is the canonical Kubernetes idiom
  # (`type Interface interface { ... }` per controller sub-package), so this
  # rule applies uniformly to every controller sub-package's `Interface`
  # implementer. Cross-package collisions of the simple name `Interface` are
  # therefore intentional, not a misfire (review #2 [F7]).
  # ---------------------------------------------------------------------------
  - description: >
      Structs in pkg/controller/** that implement an interface literally
      named `Interface` (the Kubernetes idiom for the canonical controller
      type per sub-package) must be suffixed with 'Controller'. Helper,
      option, worker, and event-handler structs that do not implement
      `Interface` are not constrained.
    package: "k8s.io/kubernetes/pkg/controller/**"
    interfaceImplementationNamingRule:
      structsThatImplement: "Interface"
      shouldHaveSimpleNameEndingWith: "Controller"

  # ---------------------------------------------------------------------------
  # Kubelet manager implementations: per-sub-package rules.
  #
  # The kubelet uses `Manager` and many `*Manager` simple names across
  # ~13 sub-packages. arch-go cannot package-qualify the lookup, so a single
  # rule on pkg/kubelet/** would conflate all of them. Instead, narrow each
  # rule to a single sub-package so `structsThatImplement` resolves to one
  # canonical interface declared in that sub-package.
  #
  # Review #4 [F3]: each rule's package is scoped to the BARE sub-package
  # (omitting the `/**` suffix) because the canonical interface declaration
  # and its primary implementing struct (e.g. `type volumeManager struct`,
  # `type containerManagerImpl struct`, `type manager struct`) live in the
  # bare package, not in any auxiliary sub-package (cache, populator,
  # reconciler, fake, helpers). The `**` glob does not match the bare path,
  # so `<X>/**` rules silently exempted exactly the structs the rules were
  # written to constrain.
  # ---------------------------------------------------------------------------
  - description: >
      Volume manager implementations in pkg/kubelet/volumemanager (the
      bare package where the canonical VolumeManager interface and its
      `volumeManager` implementer live) must be suffixed with 'Manager'
      (review #4 [F3]).
    package: "k8s.io/kubernetes/pkg/kubelet/volumemanager"
    interfaceImplementationNamingRule:
      structsThatImplement: "VolumeManager"
      shouldHaveSimpleNameEndingWith: "Manager"

  - description: >
      Image manager implementations in pkg/kubelet/images (bare package
      where ImageManager / imageManager live) must be suffixed with
      'Manager' (review #4 [F3]).
    package: "k8s.io/kubernetes/pkg/kubelet/images"
    interfaceImplementationNamingRule:
      structsThatImplement: "ImageManager"
      shouldHaveSimpleNameEndingWith: "Manager"

  - description: >
      Certificate manager implementations in pkg/kubelet/certificate (bare
      package where the canonical Manager interface lives) must be
      suffixed with 'Manager' (review #4 [F3]).
    package: "k8s.io/kubernetes/pkg/kubelet/certificate"
    interfaceImplementationNamingRule:
      structsThatImplement: "Manager"
      shouldHaveSimpleNameEndingWith: "Manager"

  - description: >
      Container manager implementations in pkg/kubelet/cm (bare package
      where ContainerManager / containerManagerImpl live; review #4 [F3])
      must be suffixed with 'Manager'. This rule targets the canonical
      `ContainerManager` interface declared in pkg/kubelet/cm/types.go.
      The cm sub-managers (cpumanager, memorymanager, topologymanager,
      devicemanager, dra) each declare their own `Manager` interface and
      are covered by the per-sub-package rules below (review #3 [F8]).
    package: "k8s.io/kubernetes/pkg/kubelet/cm"
    interfaceImplementationNamingRule:
      structsThatImplement: "ContainerManager"
      shouldHaveSimpleNameEndingWith: "Manager"

  - description: >
      CPU manager implementations in pkg/kubelet/cm/cpumanager (bare
      package; review #4 [F3]) must be suffixed with 'Manager'
      (review #3 [F8]).
    package: "k8s.io/kubernetes/pkg/kubelet/cm/cpumanager"
    interfaceImplementationNamingRule:
      structsThatImplement: "Manager"
      shouldHaveSimpleNameEndingWith: "Manager"

  - description: >
      Memory manager implementations in pkg/kubelet/cm/memorymanager (bare
      package; review #4 [F3]) must be suffixed with 'Manager'
      (review #3 [F8]).
    package: "k8s.io/kubernetes/pkg/kubelet/cm/memorymanager"
    interfaceImplementationNamingRule:
      structsThatImplement: "Manager"
      shouldHaveSimpleNameEndingWith: "Manager"

  - description: >
      Topology manager implementations in pkg/kubelet/cm/topologymanager
      (bare package; review #4 [F3]) must be suffixed with 'Manager'
      (review #3 [F8]).
    package: "k8s.io/kubernetes/pkg/kubelet/cm/topologymanager"
    interfaceImplementationNamingRule:
      structsThatImplement: "Manager"
      shouldHaveSimpleNameEndingWith: "Manager"

  - description: >
      Device manager implementations in pkg/kubelet/cm/devicemanager (bare
      package; review #4 [F3]) must be suffixed with 'Manager'
      (review #3 [F8]).
    package: "k8s.io/kubernetes/pkg/kubelet/cm/devicemanager"
    interfaceImplementationNamingRule:
      structsThatImplement: "Manager"
      shouldHaveSimpleNameEndingWith: "Manager"

  - description: >
      Dynamic Resource Allocation manager implementations in
      pkg/kubelet/cm/dra (bare package; review #4 [F3]) must be suffixed
      with 'Manager' (review #3 [F8]).
    package: "k8s.io/kubernetes/pkg/kubelet/cm/dra"
    interfaceImplementationNamingRule:
      structsThatImplement: "Manager"
      shouldHaveSimpleNameEndingWith: "Manager"

  - description: >
      ConfigMap manager implementations in pkg/kubelet/configmap (bare
      package; review #4 [F3]) must be suffixed with 'Manager'.
    package: "k8s.io/kubernetes/pkg/kubelet/configmap"
    interfaceImplementationNamingRule:
      structsThatImplement: "Manager"
      shouldHaveSimpleNameEndingWith: "Manager"

  - description: >
      Secret manager implementations in pkg/kubelet/secret (bare package;
      review #4 [F3]) must be suffixed with 'Manager'.
    package: "k8s.io/kubernetes/pkg/kubelet/secret"
    interfaceImplementationNamingRule:
      structsThatImplement: "Manager"
      shouldHaveSimpleNameEndingWith: "Manager"

  - description: >
      Status manager implementations in pkg/kubelet/status (bare package;
      review #4 [F3]) must be suffixed with 'Manager'.
    package: "k8s.io/kubernetes/pkg/kubelet/status"
    interfaceImplementationNamingRule:
      structsThatImplement: "Manager"
      shouldHaveSimpleNameEndingWith: "Manager"

  - description: >
      Eviction manager implementations in pkg/kubelet/eviction (bare
      package; review #4 [F3]) must be suffixed with 'Manager'.
    package: "k8s.io/kubernetes/pkg/kubelet/eviction"
    interfaceImplementationNamingRule:
      structsThatImplement: "Manager"
      shouldHaveSimpleNameEndingWith: "Manager"

  - description: >
      Token manager implementations in pkg/kubelet/token (bare package;
      review #4 [F3]) must be suffixed with 'Manager'.
    package: "k8s.io/kubernetes/pkg/kubelet/token"
    interfaceImplementationNamingRule:
      structsThatImplement: "Manager"
      shouldHaveSimpleNameEndingWith: "Manager"

  - description: >
      RuntimeClass manager implementations in pkg/kubelet/runtimeclass
      (bare package; review #4 [F3]) must be suffixed with 'Manager'.
    package: "k8s.io/kubernetes/pkg/kubelet/runtimeclass"
    interfaceImplementationNamingRule:
      structsThatImplement: "Manager"
      shouldHaveSimpleNameEndingWith: "Manager"

  - description: >
      ClusterTrustBundle manager implementations in
      pkg/kubelet/clustertrustbundle (bare package; review #4 [F3]) must
      be suffixed with 'Manager'.
    package: "k8s.io/kubernetes/pkg/kubelet/clustertrustbundle"
    interfaceImplementationNamingRule:
      structsThatImplement: "Manager"
      shouldHaveSimpleNameEndingWith: "Manager"

  - description: >
      PodCertificate manager implementations in pkg/kubelet/podcertificate
      (bare package; review #4 [F3]) must be suffixed with 'Manager'.
    package: "k8s.io/kubernetes/pkg/kubelet/podcertificate"
    interfaceImplementationNamingRule:
      structsThatImplement: "Manager"
      shouldHaveSimpleNameEndingWith: "Manager"

  # ---------------------------------------------------------------------------
  # Proxy backend implementations must be suffixed with 'Proxier'.
  #
  # NOTE: `Proxier` is unique to pkg/proxy/types.go in upstream kubernetes;
  # the simple-name match is unambiguous in this codebase.
  # ---------------------------------------------------------------------------
  - description: >
      Structs in pkg/proxy/** that implement the Proxier interface (the
      backend-facing interface for iptables, ipvs, nftables, and winkernel
      implementations) must be suffixed with 'Proxier'. arch-go matches the
      interface by simple name; verify before extending the rule that no
      other `Proxier` interface has been introduced under pkg/proxy/**.
    package: "k8s.io/kubernetes/pkg/proxy/**"
    interfaceImplementationNamingRule:
      structsThatImplement: "Proxier"
      shouldHaveSimpleNameEndingWith: "Proxier"

  # ---------------------------------------------------------------------------
  # Removed (review #4 [F4]): previously a `Storage` simple-name
  # `interfaceImplementationNamingRule` over `pkg/registry/**`. Removed
  # because the upstream Kubernetes convention uses suffix `REST` for
  # individual REST handlers (e.g., `type REST struct`,
  # `type StatusREST struct`, `type BindingREST struct`,
  # `type LogREST struct`, `type ProxyREST struct`,
  # `type EvictionREST struct`, `type EphemeralContainersREST struct`)
  # and only the multiplexer-aggregator struct uses suffix `Storage`
  # (e.g., `type PodStorage struct`). arch-go's single-suffix matcher
  # cannot express both, and `Storage` matches the canonical
  # `staging/src/k8s.io/apiserver/pkg/registry/rest/rest.go` Storage
  # interface — every REST handler implements it, so the rule would
  # produce hundreds of false positives across the registry tree the
  # moment coverage rises above 0%. Track REST/Storage naming via PR
  # review until arch-go grows multi-suffix or contents-rule support.
  # ---------------------------------------------------------------------------

# =============================================================================
# FUNCTIONS RULES
# =============================================================================
#
# Function-complexity caps below are calibrated against the upstream
# kubernetes baseline (review #2 [F2]). The util cap was raised from 100 to
# 250 to accommodate state-machine implementations (iptables, ipvs,
# conntrack) that legitimately don't decompose smaller. The apis cap was
# raised from 200 to 350 to accommodate validators (ValidatePodSpec,
# ValidatePersistentVolumeClaim) that collect ~30 field-level checks.
# Functions exceeding these limits are still treated as refactoring signals.
#
# Review #3 [F5] note: until the Makefile coverage floor produces a non-zero
# COVERAGE RATE on a real upstream checkout, both rules pass vacuously.
# Concrete upstream functions expected to violate the caps post-coverage:
#   - pkg/apis/core/validation/validation.go: ValidatePodSpec,
#     ValidatePodTemplateSpec, ValidatePersistentVolumeSpec  (>350 lines)
#   - pkg/apis/networking/validation/validation.go:
#     validateIngressBackend, ValidateNetworkPolicySpec
#   - pkg/util/iptables/iptables.go: (*runner).restoreInternal (>250 lines)
# If the rules pass after coverage rises above 0%, the caps are too generous
# and should be tightened until they bite a known offender.
functionsRules:

  # ---------------------------------------------------------------------------
  # Utility functions must stay simple
  # ---------------------------------------------------------------------------
  - description: >
      Shared utility functions in pkg/util/** should be focused, single-
      purpose helpers. We cap return values at 5 and length at 250 lines as
      a structural ceiling calibrated against upstream baselines (iptables /
      ipvs state-machine helpers); functions that exceed these limits are
      signals to refactor into smaller composable helpers. Review #3 [F5]:
      cap remains unverified empirically until Makefile coverage rises above
      zero — expected to flag (*runner).restoreInternal in iptables.
    package: "k8s.io/kubernetes/pkg/util/**"
    maxReturnValues: 5
    maxLines: 250

  # ---------------------------------------------------------------------------
  # API validation functions should compose, not branch
  # ---------------------------------------------------------------------------
  - description: >
      Validation functions in pkg/apis/** collect field errors and return
      them. We cap return values at 8 and length at 350 lines, calibrated
      against upstream baselines (ValidatePodSpec, ValidatePersistentVolumeClaim);
      functions that exceed these limits indicate validation logic that
      should be split into composable validators rather than written as
      monolithic if-else chains. Review #3 [F5]: cap remains unverified
      empirically — expected to flag ValidatePodSpec / ValidatePodTemplateSpec
      / ValidatePersistentVolumeSpec / validateIngressBackend /
      ValidateNetworkPolicySpec once coverage rises above zero. If they do
      not violate post-coverage, tighten the cap until they do.
    package: "k8s.io/kubernetes/pkg/apis/**"
    maxReturnValues: 8
    maxLines: 350
